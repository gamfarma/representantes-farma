name: Deploy GAM Farma — Rede de Representantes

on:
  push:
    branches:
      - main
  schedule:
    # Auto-refresh a cada 5 minutos via Actions (executa script.py para validar + registrar mudanças)
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do deploy manual"
        required: false
        default: "Atualização manual"

jobs:
  build-and-deploy:
    name: Validar dados e publicar site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configura Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Executa script.py (valida estrutura do Google Sheets + detecta mudanças)
      - name: Executar script.py
        run: python script.py

      # 4. Commit do snapshot de dados (para rastrear mudanças)
      - name: Commit snapshot de dados
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data_snapshot.json || true
          git diff --staged --quiet || git commit -m "chore: atualiza snapshot de dados [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push || true

      # 5. Publica via GitHub Pages
      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # Arquivos a publicar
          include_files: |
            index.html
          # Força atualização mesmo sem mudanças de conteúdo (cache-busting)
          force_orphan: false
          enable_jekyll: false
          commit_message: "deploy: atualiza site [${{ github.run_number }}] — $(date -u +%Y-%m-%dT%H:%M:%SZ)"

name: Atualizar Diretório GAM Farma

on:
  push:
    branches:
      - main
  schedule:
    # Atualiza automaticamente a cada 30 minutos
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # Permite atualização manual via interface do GitHub

permissions:
  contents: write

jobs:
  atualizar-e-publicar:
    runs-on: ubuntu-latest

    steps:
      # 1. Faz checkout do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura o Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instala dependências do script.py
      - name: Instalar dependências
        run: pip install requests

      # 4. Executa script.py para buscar planilha e atualizar index.html
      - name: Atualizar index.html com dados do Google Sheets
        run: python script.py

      # 5. Commita o index.html atualizado (com dados embutidos)
      - name: Salvar index.html atualizado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: index.html atualizado [$(date -u '+%d/%m/%Y %H:%M UTC')]"
          git push

      # 6. Publica no GitHub Pages (branch gh-pages)
      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: index.html
          force_orphan: false

name: Deploy GAM Farma — Rede de Representantes

on:
  push:
    branches:
      - main
  schedule:
    # Auto-atualiza a cada hora para pegar mudanças da planilha
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) Executar script.py (processa planilha e valida index.html)
      - name: Run script.py
        run: python script.py

      # 4) Verificar se houve mudanças
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data.json index.html || echo "changed=true" >> $GITHUB_OUTPUT

      # 5) Commit e push se houver mudanças
      - name: Commit updated files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git commit -m "chore: auto-update from Google Sheets [$(date -u +\'%Y-%m-%d %H:%M UTC\')]"
          git push

      # 6) Deploy para GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          force_orphan: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: update from Google Sheets [$(date -u)"

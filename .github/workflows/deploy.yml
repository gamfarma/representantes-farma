name: Atualizar site GAM Farma

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Executar script.py
        run: python script.py

      - name: Verificar se index.html foi gerado
        run: |
          if [ ! -f index.html ]; then
            echo "ERRO: index.html nao foi gerado!"
            exit 1
          fi
          echo "✅ index.html gerado com sucesso ($(wc -c < index.html) bytes)"

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit e push do index.html atualizado
        run: |
          git add index.html
          if git diff --staged --quiet; then
            echo "Nenhuma alteracao detectada no index.html"
          else
            git commit -m "chore: atualiza index.html [$(date '+%d/%m/%Y %H:%M')]"
            git push
          fi

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages

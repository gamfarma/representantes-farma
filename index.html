<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GAM Farma — Rede de Representantes</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #0a2d6e;
  --primary-light: #1a4a9e;
  --bg: #f0f4f8;
  --surface: #fff;
  --border: #dde3ee;
  --text: #1a2340;
  --text-muted: #5a6a8a;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(10,45,110,0.10);
  --shadow-hover: 0 6px 24px rgba(10,45,110,0.18);
}
html { scroll-behavior: smooth; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
#app-header {
  background: linear-gradient(135deg, #0a2d6e 0%, #1a4a9e 60%, #0d3b8e 100%);
  color: #fff;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(10,45,110,0.25);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.logo-img {
  height: 54px;
  width: auto;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
}
.header-titles { flex: 1; min-width: 160px; }
.header-titles h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
.header-titles p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.header-search {
  flex: 2;
  min-width: 200px;
  max-width: 380px;
  position: relative;
}
.header-search input {
  width: 100%;
  padding: 9px 16px 9px 38px;
  border-radius: 24px;
  border: none;
  background: rgba(255,255,255,0.18);
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: background 0.2s;
}
.header-search input::placeholder { color: rgba(255,255,255,0.7); }
.header-search input:focus { background: rgba(255,255,255,0.28); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.7; font-size: 15px; pointer-events: none; }
.header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.btn-refresh {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-refresh:hover { background: rgba(255,255,255,0.28); }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.timestamp { font-size: 11px; opacity: 0.75; white-space: nowrap; }

/* FILTER BAR */
#filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  position: sticky;
  top: 74px;
  z-index: 99;
  box-shadow: 0 1px 6px rgba(10,45,110,0.06);
}
.filter-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.filter-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.filter-select {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
  min-width: 160px;
}
.filter-select:focus { border-color: var(--primary); }
.btn-clear {
  padding: 7px 14px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  background: #fff;
  color: #c62828;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-clear:hover { background: #fce4ec; }

/* BREADCRUMB */
#breadcrumb {
  max-width: 1400px;
  margin: 0 auto;
  padding: 10px 20px 0;
  font-size: 13px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.bc-item { cursor: pointer; color: var(--primary); font-weight: 600; transition: opacity 0.2s; }
.bc-item:hover { opacity: 0.7; text-decoration: underline; }
.bc-sep { opacity: 0.4; }
.bc-current { color: var(--text-muted); font-weight: 400; cursor: default; }

/* MAIN */
#main-content {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}

/* LOADING */
#loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 16px;
}
.big-spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-text { color: var(--text-muted); font-size: 15px; }

/* ERROR */
#error-state {
  background: #fff5f5;
  border: 1px solid #ffcdd2;
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  max-width: 480px;
  margin: 60px auto;
}
.error-icon { font-size: 40px; margin-bottom: 12px; }
.error-title { font-size: 18px; font-weight: 700; color: #c62828; margin-bottom: 8px; }
.error-msg { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
.btn-retry { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-retry:hover { background: var(--primary-light); }

/* SECTION TITLE */
.section-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
.count-badge {
  background: var(--primary);
  color: #fff;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 700;
}

/* STATES GRID */
#states-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.state-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 16px;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  border: 2px solid transparent;
  position: relative;
  overflow: hidden;
}
.state-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--state-color, #607d8b);
}
.state-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--state-color, #607d8b); }
.state-sigla {
  font-size: 36px;
  font-weight: 900;
  color: var(--state-color, #607d8b);
  line-height: 1;
}
.state-name { font-size: 12px; color: var(--text-muted); font-weight: 600; text-align: center; }
.state-count { font-size: 11px; background: var(--state-color, #607d8b); color: #fff; border-radius: 12px; padding: 2px 10px; font-weight: 700; }

/* COORDINATORS GRID */
#coordinators-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.coord-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: transform 0.18s, box-shadow 0.18s;
  display: flex;
  flex-direction: column;
}
.coord-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
.coord-header {
  padding: 14px 16px 12px;
  color: #fff;
  position: relative;
}
.coord-func { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: 0.85; margin-bottom: 4px; }
.coord-name { font-size: 17px; font-weight: 800; line-height: 1.2; }
.coord-region { font-size: 12px; opacity: 0.9; margin-top: 5px; }
.coord-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.coord-contact { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.coord-contact a { color: var(--primary); text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
.coord-contact a:hover { opacity: 0.7; text-decoration: underline; }
.contact-icon { font-size: 15px; flex-shrink: 0; }
.coord-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.members-count { font-size: 12px; color: var(--text-muted); }
.btn-team {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-team:hover { background: var(--primary-light); }
.btn-clients {
  background: #fff3e0;
  color: #bf360c;
  border: 1px solid #ffcc80;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.btn-clients:hover { background: #ffe0b2; border-color: #ff9800; }

/* TEAM LEADER HEADER */
.team-leader-header {
  border-radius: var(--radius);
  padding: 20px 24px;
  color: #fff;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 16px;
  box-shadow: var(--shadow-hover);
  position: relative;
  overflow: hidden;
}
.team-leader-header::after {
  content: '';
  position: absolute;
  right: -30px; top: -30px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,0.07);
  border-radius: 50%;
}
.tlh-avatar {
  width: 56px; height: 56px;
  background: rgba(255,255,255,0.22);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 900;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.4);
}
.tlh-info-block { flex: 1; min-width: 200px; }
.tlh-func { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; }
.tlh-name { font-size: 22px; font-weight: 900; line-height: 1.2; margin-bottom: 4px; }
.tlh-region { font-size: 13px; opacity: 0.9; margin-bottom: 10px; }
.tlh-contacts { display: flex; flex-wrap: wrap; gap: 12px; }
.tlh-contact-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.tlh-contact-item a { color: rgba(255,255,255,0.92); text-decoration: none; font-weight: 600; transition: opacity 0.2s; }
.tlh-contact-item a:hover { opacity: 0.75; text-decoration: underline; }

/* TABLE */
.table-wrapper { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 13px; }
thead tr { background: var(--primary); color: #fff; }
th { padding: 12px 14px; text-align: left; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; white-space: nowrap; }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #f5f8ff; }
.func-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-rep { background: #e8f5e9; color: #1b5e20; }
.badge-tlv { background: #e3f2fd; color: #0d47a1; }
.badge-ger { background: #fce4ec; color: #880e4f; }
.badge-coord-med { background: #fff3e0; color: #bf360c; }
.badge-ded { background: #f3e5f5; color: #4a148c; }
.badge-coord { background: #e8eaf6; color: #1a237e; }
.badge-default { background: #eceff1; color: #37474f; }
.btn-cities {
  background: #e8f0fe;
  color: var(--primary);
  border: none;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.btn-cities:hover { background: #c5d8fc; }
.btn-clients-sm {
  background: #fff3e0;
  color: #bf360c;
  border: 1px solid #ffcc80;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.btn-clients-sm:hover { background: #ffe0b2; }
.contact-link { color: var(--primary); text-decoration: none; font-weight: 500; }
.contact-link:hover { text-decoration: underline; }

/* BACK BUTTON */
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--primary);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 16px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow);
}
.btn-back:hover { background: #e8f0fe; box-shadow: var(--shadow-hover); }

/* MODAL */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,20,50,0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border-radius: 14px;
  padding: 28px;
  max-width: 520px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 12px 48px rgba(10,45,110,0.25);
  animation: modalIn 0.22s ease;
}
@keyframes modalIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--text-muted);
  line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: #c62828; }
.modal-title { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 4px; padding-right: 30px; }
.modal-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
.cities-container { display: flex; flex-wrap: wrap; gap: 8px; }
.city-tag {
  background: #e8f0fe;
  color: var(--primary);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
}
.client-tag {
  background: #fff3e0;
  color: #bf360c;
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid #ffcc80;
}

/* PROGRESS BAR */
#progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 3px;
  background: #4caf50;
  z-index: 9999;
  transition: width 1s linear;
  width: 100%;
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 16px; font-weight: 600; }

/* DISTRICT LABEL */
.district-label {
  font-size: 10px;
  background: rgba(255,255,255,0.22);
  border-radius: 6px;
  padding: 2px 7px;
  display: inline-block;
  margin-top: 4px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* NO CONTACT */
.no-data { color: #bbb; font-style: italic; font-size: 12px; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .header-inner { padding: 10px 14px; gap: 10px; }
  .header-search { min-width: 100%; order: 3; }
  .logo-img { height: 40px; }
  #main-content { padding: 14px; }
  #states-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  #coordinators-grid { grid-template-columns: 1fr; }
  th, td { padding: 9px 10px; }
  .team-leader-header { padding: 16px; }
  .tlh-name { font-size: 18px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="app-header">
  <div class="header-inner">
    <img src="https://raw.githubusercontent.com/gamfarma/imagem-site/2091104c3fa6efcc97594176ed36b38218ffa0f2/Logo%20GAM%20Nova%20Branca.png" class="logo-img" alt="GAM Farma Logo" onerror="this.style.display='none'">
    <div class="header-titles">
      <h1>Rede de Representantes</h1>
      <p>Diretório comercial interativo</p>
    </div>
    <div class="header-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Buscar por nome, cidade, região…" autocomplete="off">
    </div>
    <div class="header-actions">
      <button class="btn-refresh" id="btn-refresh" title="Atualizar dados">
        <span id="refresh-icon">🔄</span>
        <span>Atualizar</span>
      </button>
      <span class="timestamp" id="timestamp"></span>
    </div>
  </div>
</header>

<!-- FILTER BAR -->
<div id="filter-bar">
  <div class="filter-inner">
    <span class="filter-label">Filtrar:</span>
    <select class="filter-select" id="filter-uf">
      <option value="">Todos os estados</option>
    </select>
    <select class="filter-select" id="filter-func">
      <option value="">Todas as funções</option>
      <option value="coordenador de equipe">Coordenadores de Equipe</option>
      <option value="representante externo">Representante Externo</option>
      <option value="televendas">Televendas (TLV)</option>
      <option value="gerente de contas">Gerente de Contas</option>
      <option value="coordenador de medias redes">Coordenador de Médias Redes</option>
      <option value="dedicado">Dedicados</option>
      <option value="gerente de projetos especiais">Ger. de Projetos Especiais</option>
    </select>
    <select class="filter-select" id="filter-region">
      <option value="">Todas as regiões</option>
    </select>
    <button class="btn-clear" id="btn-clear">✕ Limpar</button>
  </div>
</div>

<!-- BREADCRUMB -->
<div id="breadcrumb"></div>

<!-- MAIN CONTENT -->
<div id="main-content">
  <div id="loading-state">
    <div class="big-spinner"></div>
    <p class="loading-text">Carregando dados da planilha…</p>
  </div>
  <div id="error-state" style="display:none">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Erro ao carregar dados</div>
    <div class="error-msg" id="error-msg">Não foi possível conectar à planilha.</div>
    <button class="btn-retry" id="btn-retry">Tentar novamente</button>
  </div>
  <div id="view-states" style="display:none"></div>
  <div id="view-coordinators" style="display:none"></div>
  <div id="view-team" style="display:none"></div>
  <div id="view-search" style="display:none"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-box">
    <button class="modal-close" id="modal-close" aria-label="Fechar">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="cities-container" id="modal-cities"></div>
  </div>
</div>

<!-- PROGRESS BAR -->
<div id="progress-bar"></div>

<script>
// ============================================================
// CONSTANTS & CONFIG
// ============================================================
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJRPejEYUGjqFiruPTGJuS2Itk6qjvyk6moB4_ChCe5_z4_CW0jYcYXJFimYYw4kGcbP2fpdRccLkq/pub?output=csv';
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutes

const STATE_COLORS = {
  SC:'#1565c0', RS:'#c62828', PR:'#2e7d32', MS:'#e65100',
  SP:'#6a1b9a', GO:'#00838f', DF:'#4527a0', MT:'#827717',
  MG:'#4e342e', RJ:'#00695c', BA:'#f57f17', PE:'#ad1457',
  CE:'#0277bd', AM:'#558b2f', PA:'#6a1b9a', MA:'#37474f',
  PI:'#4527a0', RN:'#00838f', PB:'#c62828', AL:'#e65100',
  SE:'#1565c0', ES:'#2e7d32', TO:'#827717', RO:'#4e342e',
  AC:'#00695c', RR:'#f57f17', AP:'#ad1457', DEFAULT:'#607d8b'
};

const STATE_NAMES = {
  AC:'Acre', AL:'Alagoas', AP:'Amapá', AM:'Amazonas', BA:'Bahia',
  CE:'Ceará', DF:'Distrito Federal', ES:'Espírito Santo', GO:'Goiás',
  MA:'Maranhão', MT:'Mato Grosso', MS:'Mato Grosso do Sul', MG:'Minas Gerais',

// ============================================================
// CSV PARSER
// ============================================================
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  let headerIdx = -1;
  let updateDate = '';
  for (let i = 0; i < lines.length; i++) {
    const upper = lines[i].toUpperCase();
    if (upper.includes('DISTRITO') && upper.includes('NOME')) { headerIdx = i; break; }
    const dateMatch = lines[i].match(/\d{2}\/\d{2}\/\d{4}/);
    if (dateMatch) updateDate = dateMatch[0];
  }
  if (headerIdx === -1) return { rows:[], updateDate };
  const rawHeaders = parseLine(lines[headerIdx]);
  const headers = rawHeaders.map(h => normalizeHeader(h));
  const rows = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cells = parseLine(lines[i]);
    const row = {};
    headers.forEach((h, idx) => { row[h] = (cells[idx] || '').trim(); });
    if (!row['NOME'] || row['NOME'] === '') continue;
    rows.push(row);
  }
  return { rows, updateDate };
}

function parseLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(current); current = '';
    } else { current += ch; }
  }
  result.push(current);
  return result;
}

function normalizeHeader(h) {
  let s = h.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().trim();
  s = s.replace('COORPORATIVO','CORPORATIVO').replace('COODENADOR','COORDENADOR');
  return s;
}

// ============================================================
// HELPERS
// ============================================================
function isLeader(row) {
  const func = getFunc(row).toLowerCase();
  return func.includes('coordenador') || func.includes('gerente');
}

// Roles that attend clients (not cities), have no subordinate team
function isClientRole(func) {
  const f = func.toLowerCase();
  return f.includes('gerente de contas') || f.includes('medias redes') || f.includes('médias redes');
}

function getFunc(row) {
  return row['FUNCAO'] || row['FUNÇÃO'] || row['FUNCÃO'] || '';
}

function getUFs(row) {
  const uf = row['UF'] || '';
  if (!uf || uf === '-' || uf.toUpperCase().includes('EXPANS')) return [];
  return uf.split(/[\/\-,\s]+/).map(s => s.trim().toUpperCase()).filter(s => s.length === 2 && /^[A-Z]{2}$/.test(s));
}

function getDistrictBase(distStr) {
  const n = parseInt(distStr);
  if (isNaN(n)) return null;
  return Math.floor(n / 100) * 100;
}

// ============================================================
// PROCESS DATA
// ============================================================
function processData(rows) {
  rows = rows.map(r => {
    const nr = {};
    Object.keys(r).forEach(k => { nr[k] = r[k]; });
    if (!nr['FUNCAO']) nr['FUNCAO'] = nr['FUNÇÃO'] || nr['FUNCÃO'] || '';
    return nr;
  });

  const specialRows = rows.filter(r => (r['DISTRITO'] || '').trim() === '-');
  const normalRows  = rows.filter(r => (r['DISTRITO'] || '').trim() !== '-');

  const groupMap = {};

  normalRows.forEach(row => {
    const dist = (row['DISTRITO'] || '').trim();
    if (!dist) return;
    if (isLeader(row)) {
      if (!groupMap[dist]) groupMap[dist] = { leader:row, members:[], distKey:dist, states:[] };
      else if (!groupMap[dist].leader) groupMap[dist].leader = row;
    }
  });

  normalRows.forEach(row => {
    const dist = (row['DISTRITO'] || '').trim();
    if (!dist) return;
    if (isLeader(row)) return;
    if (groupMap[dist]) { groupMap[dist].members.push(row); return; }
    const memberBase = getDistrictBase(dist);
    let assigned = false;
    if (memberBase !== null) {
      for (const key of Object.keys(groupMap)) {
        if (key.includes('/')) {
          const parts = key.split('/');
          for (const p of parts) {
            const b = getDistrictBase(p.trim());
            if (b === memberBase) { groupMap[key].members.push(row); assigned = true; break; }
          }
          if (assigned) break;
        }
      }
    }
    if (!assigned) {
      if (!groupMap[dist]) groupMap[dist] = { leader:null, members:[], distKey:dist, states:[] };
      groupMap[dist].members.push(row);
    }
  });

  let specialLeader = specialRows.find(r => getFunc(r).toLowerCase().includes('gerente'));
  if (!specialLeader && specialRows.length > 0) specialLeader = specialRows[0];
  const specialMembers = specialRows.filter(r => r !== specialLeader);
  if (specialLeader || specialMembers.length > 0) {
    groupMap['-'] = { leader:specialLeader||null, members:specialMembers, distKey:'-', states:[] };
  }

  const stateMap = {};
  const groups = Object.values(groupMap);

  groups.forEach(group => {
    const allUFs = new Set();
    if (group.leader) getUFs(group.leader).forEach(uf => allUFs.add(uf));
    group.members.forEach(m => getUFs(m).forEach(uf => allUFs.add(uf)));
    if (allUFs.size === 0 && group.members.length > 0)
      group.members.forEach(m => getUFs(m).forEach(uf => allUFs.add(uf)));
    group.states = Array.from(allUFs);
    group.states.forEach(uf => {
      if (!stateMap[uf]) stateMap[uf] = [];
      stateMap[uf].push(group);
    });
  });

  return { groups, stateMap };
}

// ============================================================
// FETCH DATA
// ============================================================
async function fetchData() {
  showLoading();
  try {
    const url = `${CSV_URL}&cb=${Date.now()}`;
    const resp = await fetch(url, { cache:'no-store', headers:{'Cache-Control':'no-store'} });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const { rows, updateDate } = parseCSV(text);
    if (rows.length === 0) throw new Error('Nenhum dado encontrado na planilha.');
    const { groups, stateMap } = processData(rows);
    appData = { rows, groups, stateMap, updateDate };
    populateFilters();
    const now = new Date();
    document.getElementById('timestamp').textContent =
      `Atualizado: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    hideLoading();
    renderCurrentView();
    startProgressBar();
    scheduleRefresh();
  } catch(e) {
    showError(e.message);
  }
}

function populateFilters() {
  const ufSel     = document.getElementById('filter-uf');
  const regionSel = document.getElementById('filter-region');
  const ufs = Object.keys(appData.stateMap).sort();
  ufSel.innerHTML = '<option value="">Todos os estados</option>';
  ufs.forEach(uf => {
    const opt = document.createElement('option');
    opt.value = uf;
    opt.textContent = `${uf} — ${STATE_NAMES[uf]||uf}`;
    ufSel.appendChild(opt);
  });
  const regions = new Set();
  appData.rows.forEach(r => {
    const reg = (r['REGIAO']||r['REGIÃO']||'').trim();
    if (reg && reg !== '-') regions.add(reg);
  });
  regionSel.innerHTML = '<option value="">Todas as regiões</option>';
  Array.from(regions).sort().forEach(reg => {
    const opt = document.createElement('option');
    opt.value = reg.toLowerCase();
    opt.textContent = reg;
    regionSel.appendChild(opt);
  });
}

function showError(msg) {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('error-state').style.display = 'block';
  document.getElementById('error-msg').textContent = msg || 'Erro desconhecido.';
}

function renderCurrentView() {
  const query       = document.getElementById('search-input').value.trim().toLowerCase();
  const filterUF    = document.getElementById('filter-uf').value;
  const filterFunc  = document.getElementById('filter-func').value.toLowerCase();
  const filterRegion= document.getElementById('filter-region').value.toLowerCase();
  const hasFilter   = query || filterFunc || filterRegion;

  if (hasFilter || (query && filterUF)) { renderSearchResults(query, filterUF, filterFunc, filterRegion); return; }
  if (filterUF && !hasFilter) { navigateToState(filterUF); return; }
  if (currentView === 'states') renderStates();
  else if (currentView === 'coordinators') renderCoordinators(currentState);
  else if (currentView === 'team') renderTeam(currentGroup, currentState);
}

function getHeaderColor(func, uf) {
  const f = func.toLowerCase();
  if (f.includes('projetos especiais')) return '#2e7d32';
  if (f.includes('gerente de contas'))  return '#ad1457';
  if (f.includes('medias redes') || f.includes('médias redes')) return '#e65100';
  if (f.includes('tlv') || f.includes('televendas')) return '#1565c0';
  if (f.includes('expansao') || f.includes('expansão')) return '#00838f';
  return STATE_COLORS[uf] || STATE_COLORS.DEFAULT;
}

  const group = appData.groups.find(g => g.distKey === distKey);
  if (!group) return;
  currentView  = 'team';
  currentGroup = group;
  currentState = fromUF;
  renderTeam(group, fromUF);
}

function renderTeam(group, fromUF) {
  if (!group) return;
  hideAllViews();
  const leaderName = group.leader ? group.leader['NOME'] : 'Equipe';
  const ufLabel    = fromUF ? `${fromUF} — ${STATE_NAMES[fromUF]||fromUF}` : '';
  updateBreadcrumb([
    { label:'Início', action:() => goHome() },
    { label:ufLabel||'Estado', action:() => navigateToState(fromUF||currentState) },
    { label:leaderName }
  ]);
  const container = document.getElementById('view-team');
  container.style.display = 'block';

  let members = group.members;
  if (fromUF) {
    const filtered = members.filter(m => getUFs(m).includes(fromUF));
    if (filtered.length > 0) members = filtered;
  }
  const color = STATE_COLORS[fromUF] || STATE_COLORS.DEFAULT;

  // ── Back button
  let html = `<button class="btn-back" onclick="navigateToState('${fromUF||currentState}')">← Voltar aos coordenadores</button>`;

  // ── LEADER HEADER CARD
  if (group.leader) {
    const ldr    = group.leader;
    const lFunc  = getFunc(ldr);
    const lPhone = ldr['CONTATO CORPORATIVO'] || ldr['CONTATO COORPORATIVO'] || '';
    const lEmail = ldr['EMAIL'] || '';
    const lRegion= ldr['REGIAO'] || ldr['REGIÃO'] || '';
    const initials = ldr['NOME'].split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    html += `
      <div class="team-leader-header" style="background:linear-gradient(135deg,${color} 0%,${color}cc 100%)">
        <div class="tlh-avatar">${initials}</div>
        <div class="tlh-info-block">
          <div class="tlh-func">${lFunc}</div>
          <div class="tlh-name">${ldr['NOME']}</div>
          ${lRegion ? `<div class="tlh-region">📍 ${lRegion}</div>` : ''}
          <div class="tlh-contacts">
            ${lPhone ? `<div class="tlh-contact-item"><span>📱</span><a href="tel:${lPhone.replace(/\D/g,'')}">${lPhone}</a></div>` : ''}
            ${lEmail ? `<div class="tlh-contact-item"><span>✉️</span><a href="mailto:${lEmail}">${lEmail}</a></div>` : ''}
          </div>
        </div>
      </div>`;
  }

  // ── Section title
  html += `
    <div class="section-title" style="color:${color}">
      👥 Equipe de ${leaderName}
      <span class="count-badge" style="background:${color}">${members.length} membro${members.length!==1?'s':''}</span>
    </div>
    <p class="section-sub">Distrito ${group.distKey}${ufLabel?' · '+ufLabel:''}</p>`;

  if (members.length === 0) {

  } else {
    html += `
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Contato Corporativo</th>
              <th>E-mail</th>
              <th>Região</th>
              <th>Cidades / Clientes</th>
            </tr>
          </thead>
          <tbody>`;

    members.forEach(m => {
      const func   = getFunc(m);
      const badge  = getFuncBadge(func);
      const phone  = m['CONTATO CORPORATIVO'] || m['CONTATO COORPORATIVO'] || '';
      const email  = m['EMAIL'] || '';
      const region = m['REGIAO'] || m['REGIÃO'] || '';
      const cities = m['PRINCIPAIS CIDADES'] || '';
      const nome   = m['NOME'] || '';

      let citiesBtn = '<span class="no-data">—</span>';

function getFuncBadge(func) {
  const f = func.toLowerCase();
  if (f.includes('representante externo')) return { cls:'badge-rep', label:func||'Rep. Externo' };
  if (f.includes('televendas')||f.includes('tlv')||f.includes('interno')) return { cls:'badge-tlv', label:func||'Televendas' };
  if (f.includes('gerente de contas')) return { cls:'badge-ger', label:func||'Ger. de Contas' };
  if (f.includes('medias redes')||f.includes('médias redes')) return { cls:'badge-coord-med', label:func||'Coord. Médias Redes' };
  if (f.includes('dedicado')) return { cls:'badge-ded', label:func||'Dedicado' };
  if (f.includes('coordenador')) return { cls:'badge-coord', label:func||'Coordenador' };
  return { cls:'badge-default', label:func||'—' };
}

// SEARCH RESULTS
function renderSearchResults(query, filterUF, filterFunc, filterRegion) {
  hideAllViews();
  updateBreadcrumb([
    { label:'Início', action:() => goHome() },
    { label:'Resultados da busca' }
  ]);
  const container = document.getElementById('view-search');
  container.style.display = 'block';

  let results = appData.rows.filter(r => {
    const nome   = (r['NOME']||'').toLowerCase();
    const uf     = (r['UF']||'').toUpperCase();
    const func   = getFunc(r).toLowerCase();
    const region = (r['REGIAO']||r['REGIÃO']||'').toLowerCase();
    const cities = (r['PRINCIPAIS CIDADES']||'').toLowerCase();
    if (query && !nome.includes(query) && !cities.includes(query) && !region.includes(query)) return false;
    if (filterUF && !uf.split(/[\/\-,\s]+/).map(s=>s.trim()).includes(filterUF)) return false;
    if (filterFunc && !func.includes(filterFunc)) return false;
    if (filterRegion && !region.includes(filterRegion)) return false;

    <div class="section-title">🔍 Resultados da busca <span class="count-badge">${results.length}</span></div>
    <p class="section-sub">Mostrando ${results.length} resultado${results.length!==1?'s':''}.</p>`;

  if (results.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum resultado encontrado.</div></div>`;
  } else {
    html += `
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th><th>Função</th><th>UF</th><th>Região</th>
              <th>Contato</th><th>E-mail</th><th>Cidades / Clientes</th>
            </tr>
          </thead>
          <tbody>`;
    results.forEach(r => {
      const func   = getFunc(r);
      const badge  = getFuncBadge(func);
      const phone  = r['CONTATO CORPORATIVO']||r['CONTATO COORPORATIVO']||'';
      const email  = r['EMAIL']||'';
      const region = r['REGIAO']||r['REGIÃO']||'';
      const cities = r['PRINCIPAIS CIDADES']||'';
      const uf     = r['UF']||'';
      const nome   = r['NOME']||'';
      const isClient = isClientRole(func);

      let citiesBtn = '<span class="no-data">—</span>';
      if (cities) {
        citiesBtn = isClient
          ? `<button class="btn-clients-sm" onclick="openClientsModal('${escapeAttr(nome)}','${escapeAttr(region)}','${escapeAttr(cities)}')">🏪 Clientes</button>`
          : `<button class="btn-cities" onclick="openCitiesModal('${escapeAttr(nome)}','${escapeAttr(region)}','${escapeAttr(cities)}')">📍 Cidades</button>`;
      }

      html += `
            <tr>
              <td><strong>${nome}</strong></td>
              <td><span class="func-badge ${badge.cls}">${badge.label}</span></td>
              <td>${uf}</td>
              <td>${region||'<span class="no-data">—</span>'}</td>
              <td>${phone?`<a class="contact-link" href="tel:${phone.replace(/\D/g,'')}">${phone}</a>`:'<span class="no-data">—</span>'}</td>
              <td>${email?`<a class="contact-link" href="mailto:${email}">${email}</a>`:'<span class="no-data">—</span>'}</td>
              <td>${citiesBtn}</td>
            </tr>`;
    });
    html += '</tbody></table></div>';
  }
  container.innerHTML = html;
}

// ============================================================
// NAVIGATION HELPERS
// ============================================================
function goHome() {
  currentView = 'states'; currentState = null; currentGroup = null;
  document.getElementById('filter-uf').value = '';
  document.getElementById('filter-func').value = '';
  document.getElementById('filter-region').value = '';
  document.getElementById('search-input').value = '';
  renderStates();
}

function hideAllViews() {
  ['view-states','view-coordinators','view-team','view-search'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

function updateBreadcrumb(items) {
  const bc = document.getElementById('breadcrumb');
  if (items.length <= 1 && items[0].label === 'Início') { bc.innerHTML = ''; return; }
  let html = '';
  items.forEach((item, i) => {
    if (i > 0) html += '<span class="bc-sep">›</span>';
    if (i === items.length - 1) {
      html += `<span class="bc-current">${item.label}</span>`;
    } else if (item.action) {
      html += `<span class="bc-item" onclick="(${item.action.toString()})()">${item.label}</span>`;
    } else {
      html += `<span class="bc-item" onclick="goHome()">${item.label}</span>`;
    }
  });
  bc.innerHTML = html;
}

// ============================================================
// MODALS
// ============================================================
function openCitiesModal(nome, region, citiesStr) {
  document.getElementById('modal-title').textContent = nome;
  document.getElementById('modal-subtitle').textContent = `📍 Principais cidades${region?' — '+region:''}`;
  const cities = citiesStr.split(/[,;\/]+/).map(c=>c.trim()).filter(c=>c);
  document.getElementById('modal-cities').innerHTML =
    cities.map(c=>`<span class="city-tag">📌 ${c}</span>`).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function openClientsModal(nome, region, clientsStr) {
  document.getElementById('modal-title').textContent = nome;
  document.getElementById('modal-subtitle').textContent = `🏪 Clientes atendidos${region?' — '+region:''}`;
  const clients = (clientsStr||'').split(/[,;\/]+/).map(c=>c.trim()).filter(c=>c);
  if (clients.length === 0) {
    document.getElementById('modal-cities').innerHTML = '<span class="no-data" style="font-size:14px">Nenhum cliente cadastrado ainda.</span>';
  } else {
    document.getElementById('modal-cities').innerHTML =
      clients.map(c=>`<span class="client-tag">🏬 ${c}</span>`).join('');
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ============================================================
// AUTO-REFRESH & PROGRESS BAR
// ============================================================
function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => { fetchData(); }, REFRESH_INTERVAL);
}

function startProgressBar() {
  const bar = document.getElementById('progress-bar');
  progressStart = Date.now();
  if (progressTimer) clearInterval(progressTimer);
  bar.style.transition = 'none';
  bar.style.width = '100%';
  progressTimer = setInterval(() => {
    const elapsed   = Date.now() - progressStart;
    const remaining = Math.max(0, 1 - elapsed / REFRESH_INTERVAL);
    bar.style.transition = 'width 1s linear';
    bar.style.width = (remaining * 100) + '%';
    if (remaining <= 0) clearInterval(progressTimer);
  }, 1000);
}

// ============================================================
// REFRESH BUTTON
// ============================================================
document.getElementById('btn-refresh').addEventListener('click', () => {
  const icon = document.getElementById('refresh-icon');
  icon.outerHTML = '<span class="spinner" id="refresh-icon"></span>';
  if (refreshTimer) clearTimeout(refreshTimer);
  if (progressTimer) clearInterval(progressTimer);
  fetchData().finally(() => {
    const spinner = document.getElementById('refresh-icon');
    if (spinner) spinner.outerHTML = '<span id="refresh-icon">🔄</span>';
  });
});

document.getElementById('btn-retry').addEventListener('click', fetchData);

// ============================================================
// FILTERS & SEARCH
// ============================================================
let searchDebounce = null;
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => { if (appData.rows.length > 0) renderCurrentView(); }, 300);
});
document.getElementById('filter-uf').addEventListener('change', () => { if (appData.rows.length>0) renderCurrentView(); });
document.getElementById('filter-func').addEventListener('change', () => { if (appData.rows.length>0) renderCurrentView(); });
document.getElementById('filter-region').addEventListener('change', () => { if (appData.rows.length>0) renderCurrentView(); });
document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-uf').value    = '';
  document.getElementById('filter-func').value  = '';
  document.getElementById('filter-region').value= '';
  if (appData.rows.length > 0) goHome();
});

// ============================================================
// UTILS
// ============================================================
function escapeAttr(str) {
  return (str||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ');
}

// ============================================================
// INIT
// ============================================================
fetchData();
</script>

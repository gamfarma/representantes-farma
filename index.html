<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GAM Farma — Rede de Representantes</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #0a2d6e;
  --primary-light: #1a4a9e;
  --bg: #f0f4f8;
  --surface: #fff;
  --border: #dde3ee;
  --text: #1a2340;
  --text-muted: #5a6a8a;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(10,45,110,0.10);
  --shadow-hover: 0 6px 24px rgba(10,45,110,0.18);
}
html { scroll-behavior: smooth; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

#app-header {
  background: linear-gradient(135deg, #0a2d6e 0%, #1a4a9e 60%, #0d3b8e 100%);
  color: #fff;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(10,45,110,0.25);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.header-titles { flex: 1; min-width: 160px; }
.header-titles h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
.header-titles p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.header-search {
  flex: 2;
  min-width: 200px;
  max-width: 380px;
  position: relative;
}
.header-search input {
  width: 100%;
  padding: 9px 16px 9px 38px;
  border-radius: 24px;
  border: none;
  background: rgba(255,255,255,0.18);
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: background 0.2s;
}
.header-search input::placeholder { color: rgba(255,255,255,0.7); }
.header-search input:focus { background: rgba(255,255,255,0.28); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.7; font-size: 15px; pointer-events: none; }
.header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.btn-refresh {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-refresh:hover { background: rgba(255,255,255,0.28); }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.timestamp { font-size: 11px; opacity: 0.75; white-space: nowrap; }
.countdown { font-size: 11px; opacity: 0.75; white-space: nowrap; color: #a8d8a8; }

#filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  position: sticky;
  top: 74px;
  z-index: 99;
  box-shadow: 0 1px 6px rgba(10,45,110,0.06);
}
.filter-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.filter-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.filter-select {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
  min-width: 160px;
}
.filter-select:focus { border-color: var(--primary); }
.btn-clear {
  padding: 7px 14px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  background: #fff;
  color: #c62828;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-clear:hover { background: #fce4ec; }

#breadcrumb {
  max-width: 1400px;
  margin: 0 auto;
  padding: 10px 20px 0;
  font-size: 13px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.bc-item { cursor: pointer; color: var(--primary); font-weight: 600; transition: opacity 0.2s; }
.bc-item:hover { opacity: 0.7; text-decoration: underline; }
.bc-sep { opacity: 0.4; }
.bc-current { color: var(--text-muted); font-weight: 400; cursor: default; }

#main-content {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}

#loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 16px;
}
.big-spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-text { color: var(--text-muted); font-size: 15px; }

#error-state {
  background: #fff5f5;
  border: 1px solid #ffcdd2;
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  max-width: 520px;
  margin: 60px auto;
}
.error-icon { font-size: 40px; margin-bottom: 12px; }
.error-title { font-size: 18px; font-weight: 700; color: #c62828; margin-bottom: 8px; }
.error-msg { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; white-space: pre-line; text-align: left; line-height: 1.7; }
.btn-retry { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-retry:hover { background: var(--primary-light); }

.section-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
.count-badge {
  background: var(--primary);
  color: #fff;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 12px;
  font-weight: 700;
}

#states-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.state-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 16px;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  border: 2px solid transparent;
  position: relative;
  overflow: hidden;
}
.state-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--state-color, #607d8b);
}
.state-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--state-color, #607d8b); }
.state-sigla {
  font-size: 36px;
  font-weight: 900;
  color: var(--state-color, #607d8b);
  line-height: 1;
}
.state-name { font-size: 12px; color: var(--text-muted); font-weight: 600; text-align: center; }
.state-count { font-size: 11px; background: var(--state-color, #607d8b); color: #fff; border-radius: 12px; padding: 2px 10px; font-weight: 700; }

#coordinators-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.coord-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: transform 0.18s, box-shadow 0.18s;
  display: flex;
  flex-direction: column;
}
.coord-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
.coord-header {
  padding: 14px 16px 12px;
  color: #fff;
  position: relative;
}
.coord-func { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: 0.85; margin-bottom: 4px; }
.coord-name { font-size: 17px; font-weight: 800; line-height: 1.2; }
.coord-region { font-size: 12px; opacity: 0.9; margin-top: 5px; }
.coord-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.coord-contact { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.coord-contact a { color: var(--primary); text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
.coord-contact a:hover { opacity: 0.7; text-decoration: underline; }
.contact-icon { font-size: 15px; flex-shrink: 0; }
.coord-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.members-count { font-size: 12px; color: var(--text-muted); }
.btn-team {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-team:hover { background: var(--primary-light); }
.btn-clients {
  background: #fff3e0;
  color: #bf360c;
  border: 1px solid #ffcc80;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.btn-clients:hover { background: #ffe0b2; border-color: #ff9800; }

.team-leader-header {
  border-radius: var(--radius);
  padding: 20px 24px;
  color: #fff;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 16px;
  box-shadow: var(--shadow-hover);
  position: relative;
  overflow: hidden;
}
.team-leader-header::after {
  content: '';
  position: absolute;
  right: -30px; top: -30px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,0.07);
  border-radius: 50%;
}
.tlh-avatar {
  width: 56px; height: 56px;
  background: rgba(255,255,255,0.22);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 900;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.4);
}
.tlh-info-block { flex: 1; min-width: 200px; }
.tlh-func { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; }
.tlh-name { font-size: 22px; font-weight: 900; line-height: 1.2; margin-bottom: 4px; }
.tlh-region { font-size: 13px; opacity: 0.9; margin-bottom: 10px; }
.tlh-contacts { display: flex; flex-wrap: wrap; gap: 12px; }
.tlh-contact-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.tlh-contact-item a { color: rgba(255,255,255,0.92); text-decoration: none; font-weight: 600; transition: opacity 0.2s; }
.tlh-contact-item a:hover { opacity: 0.75; text-decoration: underline; }

.table-wrapper { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 13px; }
thead tr { background: var(--primary); color: #fff; }
th { padding: 12px 14px; text-align: left; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; white-space: nowrap; }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #f5f8ff; }
.func-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-rep { background: #e8f5e9; color: #1b5e20; }
.badge-tlv { background: #e3f2fd; color: #0d47a1; }
.badge-ger { background: #fce4ec; color: #880e4f; }
.badge-coord-med { background: #fff3e0; color: #bf360c; }
.badge-ded { background: #f3e5f5; color: #4a148c; }
.badge-coord { background: #e8eaf6; color: #1a237e; }
.badge-default { background: #eceff1; color: #37474f; }
.btn-cities {
  background: #e8f0fe;
  color: var(--primary);
  border: none;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.btn-cities:hover { background: #c5d8fc; }
.btn-clients-sm {
  background: #fff3e0;
  color: #bf360c;
  border: 1px solid #ffcc80;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.btn-clients-sm:hover { background: #ffe0b2; }
.contact-link { color: var(--primary); text-decoration: none; font-weight: 500; }
.contact-link:hover { text-decoration: underline; }

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--primary);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 16px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow);
}
.btn-back:hover { background: #e8f0fe; box-shadow: var(--shadow-hover); }

#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,20,50,0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border-radius: 14px;
  padding: 28px;
  max-width: 520px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 12px 48px rgba(10,45,110,0.25);
  animation: modalIn 0.22s ease;
}
@keyframes modalIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--text-muted);
  line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: #c62828; }
.modal-title { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 4px; padding-right: 30px; }
.modal-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
.cities-container { display: flex; flex-wrap: wrap; gap: 8px; }
.city-tag {
  background: #e8f0fe;
  color: var(--primary);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
}
.client-tag {
  background: #fff3e0;
  color: #bf360c;
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid #ffcc80;
}

#progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 3px;
  background: #4caf50;
  z-index: 9999;
  transition: width 1s linear;
  width: 100%;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 16px; font-weight: 600; }

.district-label {
  font-size: 10px;
  background: rgba(255,255,255,0.22);
  border-radius: 6px;
  padding: 2px 7px;
  display: inline-block;
  margin-top: 4px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.no-data { color: #bbb; font-style: italic; font-size: 12px; }

@media (max-width: 600px) {
  .header-inner { padding: 10px 14px; gap: 10px; }
  .header-search { min-width: 100%; order: 3; }
  #main-content { padding: 14px; }
  #states-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  #coordinators-grid { grid-template-columns: 1fr; }
  th, td { padding: 9px 10px; }
  .team-leader-header { padding: 16px; }
  .tlh-name { font-size: 18px; }
}
</style>
</head>
<body>

<header id="app-header">
  <div class="header-inner">
    <div class="header-titles">
      <h1>🏥 GAM Farma</h1>
      <p>Rede de Representantes — Diretório comercial interativo</p>
    </div>
    <div class="header-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Buscar por nome, cidade, região…" autocomplete="off">
    </div>
    <div class="header-actions">
      <button class="btn-refresh" id="btn-refresh" title="Atualizar dados">
        <span id="refresh-icon">🔄</span>
        <span>Atualizar</span>
      </button>
      <span class="timestamp" id="timestamp"></span>
      <span class="countdown" id="countdown"></span>
    </div>
  </div>
</header>

<div id="filter-bar">
  <div class="filter-inner">
    <span class="filter-label">Filtrar:</span>
    <select class="filter-select" id="filter-uf">
      <option value="">Todos os estados</option>
    </select>
    <select class="filter-select" id="filter-func">
      <option value="">Todas as funções</option>
      <option value="coordenador de equipe">Coordenadores de Equipe</option>
      <option value="representante externo">Representante Externo</option>
      <option value="televendas">Televendas (TLV)</option>
      <option value="gerente de contas">Gerente de Contas</option>
      <option value="coordenador de medias redes">Coordenador de Médias Redes</option>
      <option value="dedicado">Dedicados</option>
      <option value="gerente de projetos especiais">Ger. de Projetos Especiais</option>
    </select>
    <select class="filter-select" id="filter-region">
      <option value="">Todas as regiões</option>
    </select>
    <button class="btn-clear" id="btn-clear">✕ Limpar</button>
  </div>
</div>

<div id="breadcrumb"></div>

<div id="main-content">
  <div id="loading-state">
    <div class="big-spinner"></div>
    <p class="loading-text">Carregando dados da planilha…</p>
  </div>
  <div id="error-state" style="display:none">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Erro ao carregar dados</div>
    <div class="error-msg" id="error-msg">Não foi possível conectar à planilha.</div>
    <button class="btn-retry" id="btn-retry">Tentar novamente</button>
  </div>
  <div id="view-states" style="display:none"></div>
  <div id="view-coordinators" style="display:none"></div>
  <div id="view-team" style="display:none"></div>
  <div id="view-search" style="display:none"></div>
</div>

<div id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-box">
    <button class="modal-close" id="modal-close" aria-label="Fechar">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="cities-container" id="modal-cities"></div>
  </div>
</div>

<div id="progress-bar"></div>

<script>
// ============================================================
// CONFIGURAÇÃO — altere apenas esta URL se necessário
// ============================================================
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJRPejEYUGjqFiruPTGJuS2Itk6qjvyk6moB4_ChCe5_z4_CW0jYcYXJFimYYw4kGcbP2fpdRccLkq/pub?output=csv';
const REFRESH_INTERVAL = 2 * 60 * 1000; // 2 minutos

// ============================================================
// DADOS ESTÁTICOS DE SUPORTE (não alterar)
// ============================================================
const STATE_COLORS = {
  AC:'#e53935',AL:'#8e24aa',AM:'#00897b',AP:'#f4511e',BA:'#1e88e5',
  CE:'#43a047',DF:'#6d4c41',ES:'#00acc1',GO:'#fb8c00',MA:'#e91e63',
  MG:'#3949ab',MS:'#00897b',MT:'#f4511e',PA:'#8e24aa',PB:'#1e88e5',
  PE:'#c0392b',PI:'#43a047',PR:'#0288d1',RJ:'#e53935',RN:'#fb8c00',
  RO:'#6d4c41',RR:'#00acc1',RS:'#2e7d32',SC:'#1565c0',SE:'#ad1457',
  SP:'#1a237e',TO:'#f57f17'
};

const STATE_NAMES = {
  AC:'Acre',AL:'Alagoas',AM:'Amazonas',AP:'Amapá',BA:'Bahia',
  CE:'Ceará',DF:'Distrito Federal',ES:'Espírito Santo',GO:'Goiás',MA:'Maranhão',
  MG:'Minas Gerais',MS:'Mato Grosso do Sul',MT:'Mato Grosso',PA:'Pará',PB:'Paraíba',
  PE:'Pernambuco',PI:'Piauí',PR:'Paraná',RJ:'Rio de Janeiro',RN:'Rio Grande do Norte',
  RO:'Rondônia',RR:'Roraima',RS:'Rio Grande do Sul',SC:'Santa Catarina',SE:'Sergipe',
  SP:'São Paulo',TO:'Tocantins'
};

// ============================================================
// ESTADO DA APLICAÇÃO
// ============================================================
let allData = [];
let currentView = 'states';
let currentState = null;
let currentCoord = null;
let progressStart = Date.now();
let refreshTimer = null;
let countdownTimer = null;

// ============================================================
// PARSE CSV
// ============================================================
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseLine(lines[0]).map(normalizeHeader);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseLine(lines[i]);
    if (vals.every(v => !v.trim())) continue;
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx] || '').trim(); });
    rows.push(obj);
  }
  return rows;
}

function parseLine(line) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else { inQ = !inQ; }
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

function normalizeHeader(h) {
  return h.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9_]/g, '_')
    .replace(/_+/g, '_')
    .replace(/^_|_$/g, '');
}

// ============================================================
// HELPERS
// ============================================================
function isLeader(row) {
  const f = getFunc(row).toLowerCase();
  return f.includes('coordenador de equipe') || f.includes('coordenador de medias') || f.includes('gerente de contas') || f.includes('gerente de projetos');
}

function isClientRole(row) {
  const f = getFunc(row).toLowerCase();
  return f.includes('dedicado') || f.includes('coordenador de medias');
}

function getFunc(row) {
  return row['funcao'] || row['função'] || row['cargo'] || row['role'] || row['func'] || '';
}

function getUFs(row) {
  const uf = row['uf'] || row['estado'] || row['state'] || row['uf_estado'] || '';
  return uf.split(/[,;/]/).map(s => s.trim().toUpperCase()).filter(Boolean);
}

function getDistrictBase(row) {
  return row['distrito'] || row['district'] || row['regiao'] || row['região'] || row['region'] || '';
}

function processData(rows) {
  return rows.filter(r => {
    const name = r['nome'] || r['name'] || r['representante'] || '';
    return name.trim().length > 0;
  });
}

// ============================================================
// FETCH — 100% dinâmico, sem dados hardcoded
// ============================================================
async function fetchData() {
  showLoading();
  try {
    const url = `${CSV_URL}&nocache=${Date.now()}`;
    const resp = await fetch(url, {
      cache: 'no-store',
      headers: {
        'Cache-Control': 'no-cache, no-store, must-revalidate',
        'Pragma': 'no-cache'
      }
    }).catch(async () => fetch(CSV_URL, { cache: 'no-store' }));

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const rows = parseCSV(text);

    // TODOS os dados vêm exclusivamente do Google Sheets.
    // Para adicionar/remover/renomear qualquer pessoa, edite apenas a planilha.
    allData = processData(rows);

    populateFilters();
    hideLoading();
    renderCurrentView();

    const now = new Date();
    const next = new Date(now.getTime() + REFRESH_INTERVAL);
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('timestamp').textContent =
      `Atualizado: ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} · Próx: ${pad(next.getHours())}:${pad(next.getMinutes())}`;

    progressStart = Date.now();
    startCountdown();
    startProgressBar();

  } catch(e) {
    hideLoading();
    showError('Não foi possível carregar os dados.\n\nDetalhes: ' + e.message + '\n\nVerifique sua conexão e tente novamente.');
  }
}

// ============================================================
// FILTROS
// ============================================================
function populateFilters() {
  const ufSel = document.getElementById('filter-uf');
  const regionSel = document.getElementById('filter-region');
  const ufs = new Set();
  const regions = new Set();
  allData.forEach(r => {
    getUFs(r).forEach(u => ufs.add(u));
    const reg = getDistrictBase(r);
    if (reg) regions.add(reg);
  });
  const curUF = ufSel.value;
  const curReg = regionSel.value;
  ufSel.innerHTML = '<option value="">Todos os estados</option>';
  [...ufs].sort().forEach(u => {
    const o = document.createElement('option');
    o.value = u; o.textContent = u + (STATE_NAMES[u] ? ' — ' + STATE_NAMES[u] : '');
    ufSel.appendChild(o);
  });
  ufSel.value = curUF;
  regionSel.innerHTML = '<option value="">Todas as regiões</option>';
  [...regions].sort().forEach(reg => {
    const o = document.createElement('option');
    o.value = reg; o.textContent = reg;
    regionSel.appendChild(o);
  });
  regionSel.value = curReg;
}

function getFilteredData() {
  const uf = document.getElementById('filter-uf').value;
  const func = document.getElementById('filter-func').value.toLowerCase();
  const region = document.getElementById('filter-region').value.toLowerCase();
  return allData.filter(r => {
    if (uf && !getUFs(r).includes(uf)) return false;
    if (func && !getFunc(r).toLowerCase().includes(func)) return false;
    if (region && !getDistrictBase(r).toLowerCase().includes(region)) return false;
    return true;
  });
}

  document.getElementById('error-state').style.display = 'none';

function renderCurrentView() {
  const q = document.getElementById('search-input').value.trim();
  if (q.length >= 2) { renderSearchResults(q); return; }
  if (currentView === 'states') renderStates();
  else if (currentView === 'coordinators') renderCoordinators();
  else if (currentView === 'team') renderTeam();
}

function renderStates() {
  currentView = 'states';
  hideAllViews();
  updateBreadcrumb();
  const data = getFilteredData();
  const container = document.getElementById('view-states');
  container.style.display = 'block';

  const stateMap = {};
  data.forEach(r => {
    getUFs(r).forEach(uf => {
      if (!stateMap[uf]) stateMap[uf] = 0;
      stateMap[uf]++;
    });
  });

  const states = Object.keys(stateMap).sort();
  if (states.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-text">Nenhum estado encontrado</div></div>`;
    return;
  }

  container.innerHTML = `
    <div class="section-title">🗺️ Estados <span class="count-badge">${states.length}</span></div>
    <p class="section-sub">Selecione um estado para ver os coordenadores e representantes</p>
    <div id="states-grid"></div>
  `;
  const grid = container.querySelector('#states-grid');
  states.forEach(uf => {
    const color = STATE_COLORS[uf] || '#607d8b';
    const card = document.createElement('div');
    card.className = 'state-card';
    card.style.setProperty('--state-color', color);
    card.innerHTML = `
      <div class="state-sigla">${uf}</div>
      <div class="state-name">${STATE_NAMES[uf] || uf}</div>
      <div class="state-count">${stateMap[uf]} pessoa${stateMap[uf] !== 1 ? 's' : ''}</div>
    `;
    card.addEventListener('click', () => navigateToState(uf));
    grid.appendChild(card);
  });
}

function navigateToState(uf) {
  currentState = uf;
  currentView = 'coordinators';
  renderCoordinators();
}

function renderCoordinators() {
  currentView = 'coordinators';
  hideAllViews();
  updateBreadcrumb();
  const data = getFilteredData().filter(r => getUFs(r).includes(currentState));
  const container = document.getElementById('view-coordinators');

  container.innerHTML = `
    <button class="btn-back" id="back-to-states">← Voltar aos Estados</button>
    <div class="section-title" style="color:${color}">📋 ${currentState} — ${STATE_NAMES[currentState] || currentState} <span class="count-badge" style="background:${color}">${leaders.length}</span></div>
    <p class="section-sub">${data.length} pessoa${data.length !== 1 ? 's' : ''} neste estado · Clique em "Ver Equipe" para detalhar</p>
    <div id="coordinators-grid"></div>
  `;
  container.querySelector('#back-to-states').addEventListener('click', () => {
    currentState = null;
    renderStates();
  });

  const grid = container.querySelector('#coordinators-grid');

  if (leaders.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">Nenhum coordenador encontrado para este estado</div></div>`;
    return;
  }

  leaders.forEach(leader => {
    const name = leader['nome'] || leader['name'] || leader['representante'] || '—';
    const func = getFunc(leader);
    const region = getDistrictBase(leader);
    const phone = leader['telefone'] || leader['phone'] || leader['celular'] || '';
    const email = leader['email'] || leader['e_mail'] || '';
    const district = leader['distrito'] || leader['district'] || '';
    const bgColor = getHeaderColor(func);

    const teamMembers = data.filter(r => {
      if (isLeader(r)) return false;
      const rDistrict = r['distrito'] || r['district'] || '';
      return district ? rDistrict === district : true;
    });

    const card = document.createElement('div');
    card.className = 'coord-card';
    card.innerHTML = `
      <div class="coord-header" style="background:${bgColor}">
        <div class="coord-func">${func}</div>
        <div class="coord-name">${name}</div>
        <div class="coord-region">${region || district || ''}</div>
      </div>
      <div class="coord-body">
        ${phone ? `<div class="coord-contact"><span class="contact-icon">📱</span><a href="https://wa.me/55${phone.replace(/\D/g,'')}" target="_blank">${phone}</a></div>` : ''}
        ${email ? `<div class="coord-contact"><span class="contact-icon">✉️</span><a href="mailto:${email}">${email}</a></div>` : ''}
        ${!phone && !email ? `<div class="no-data">Sem contato cadastrado</div>` : ''}
      </div>
      <div class="coord-footer">
        <span class="members-count">👥 ${teamMembers.length} membro${teamMembers.length !== 1 ? 's' : ''}</span>
        <div style="display:flex;gap:6px">
          ${isClientRole(leader) ? `<button class="btn-clients" data-leader="${name}">🏪 Clientes</button>` : ''}
          <button class="btn-team" data-leader="${name}">Ver Equipe →</button>
        </div>
      </div>
    `;
    card.querySelector('.btn-team').addEventListener('click', () => navigateToTeam(leader, data));
    const btnClients = card.querySelector('.btn-clients');
    if (btnClients) btnClients.addEventListener('click', () => openClientsModal(leader));
    grid.appendChild(card);
  });
}

function getHeaderColor(func) {
  const f = (func || '').toLowerCase();
  if (f.includes('coordenador de equipe')) return '#1a237e';
  if (f.includes('gerente de contas')) return '#880e4f';
  if (f.includes('coordenador de medias')) return '#bf360c';
  if (f.includes('gerente de projetos')) return '#4a148c';
  return '#0a2d6e';
}

function navigateToTeam(leader, stateData) {
  currentCoord = leader;
  currentView = 'team';
  renderTeam(leader, stateData);
}

function renderTeam(leader, stateData) {
  if (!leader && currentCoord) leader = currentCoord;
  if (!stateData) stateData = getFilteredData().filter(r => getUFs(r).includes(currentState));
  currentView = 'team';
  hideAllViews();
  updateBreadcrumb();

  const container = document.getElementById('view-team');
  container.style.display = 'block';

  const name = leader['nome'] || leader['name'] || leader['representante'] || '—';
  const func = getFunc(leader);
  const region = getDistrictBase(leader);
  const phone = leader['telefone'] || leader['phone'] || leader['celular'] || '';
  const email = leader['email'] || leader['e_mail'] || '';

  const bgColor = getHeaderColor(func);

  const teamMembers = stateData.filter(r => {
    if (isLeader(r)) return false;
    const rDistrict = r['distrito'] || r['district'] || '';

    <button class="btn-back" id="back-to-coords">← Voltar aos Coordenadores</button>

    </div>

    <p class="section-sub">${teamMembers.length} membro${teamMembers.length !== 1 ? 's' : ''} na equipe de ${name}</p>
  `;

  container.querySelector('#back-to-coords').addEventListener('click', () => {

    renderCoordinators();

  if (teamMembers.length === 0) {

function getFuncBadge(func) {
  const f = (func || '').toLowerCase();
  if (f.includes('representante')) return { cls: 'badge-rep', label: 'Rep. Externo' };
  if (f.includes('televendas') || f.includes('tlv')) return { cls: 'badge-tlv', label: 'Televendas' };
  if (f.includes('gerente de contas')) return { cls: 'badge-ger', label: 'Ger. Contas' };
  if (f.includes('coordenador de medias')) return { cls: 'badge-coord-med', label: 'Coord. Médias' };
  if (f.includes('dedicado')) return { cls: 'badge-ded', label: 'Dedicado' };
  if (f.includes('coordenador')) return { cls: 'badge-coord', label: 'Coordenador' };
  return { cls: 'badge-default', label: func };
}

  hideAllViews();

  const lower = q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const results = allData.filter(r => {
    const name   = (r['nome'] || r['name'] || r['representante'] || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const cities = (r['cidades'] || r['cities'] || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const region = getDistrictBase(r).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const uf     = getUFs(r).join(' ').toLowerCase();
    const func   = getFunc(r).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  const tableWrapper = document.createElement('div');

  tableWrapper.innerHTML = `
    <table>
      <thead>
        <tr><th>Nome</th><th>Função</th><th>UF</th><th>Distrito</th><th>Telefone</th><th>E-mail</th><th>Cidades</th></tr>
      </thead>

  container.appendChild(tableWrapper);

function goHome() {
  currentView = 'states'; currentState = null; currentCoord = null;
  document.getElementById('search-input').value = '';
  document.getElementById('filter-uf').value = '';
  document.getElementById('filter-func').value = '';
  document.getElementById('filter-region').value = '';
  renderStates();
}

function hideAllViews() {
  ['view-states','view-coordinators','view-team','view-search'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

function updateBreadcrumb(searchQ) {
  const bc = document.getElementById('breadcrumb');
  const parts = [];
  parts.push(`<span class="bc-item" id="bc-home">🏠 Início</span>`);
  if (searchQ) {
    parts.push(`<span class="bc-sep">›</span><span class="bc-current">Busca: "${searchQ}"</span>`);
  } else if (currentState) {
    parts.push(`<span class="bc-sep">›</span>`);
    if (currentView === 'coordinators') {
      parts.push(`<span class="bc-current">${currentState} — ${STATE_NAMES[currentState] || currentState}</span>`);
    } else if (currentView === 'team' && currentCoord) {
      parts.push(`<span class="bc-item" id="bc-state">${currentState} — ${STATE_NAMES[currentState] || currentState}</span>`);
      parts.push(`<span class="bc-sep">›</span>`);
      const leaderName = currentCoord['nome'] || currentCoord['name'] || currentCoord['representante'] || '—';
      parts.push(`<span class="bc-current">${leaderName}</span>`);
    }
  }
  bc.innerHTML = parts.join('');
  const bcHome = bc.querySelector('#bc-home');
  if (bcHome) bcHome.addEventListener('click', goHome);
  const bcState = bc.querySelector('#bc-state');
  if (bcState) bcState.addEventListener('click', () => { currentView = 'coordinators'; renderCoordinators(); });
}

function openCitiesModal(personName, citiesStr) {
  const cities = citiesStr.split(/[,;|]/).map(c => c.trim()).filter(Boolean);
  document.getElementById('modal-title').textContent = personName;
  document.getElementById('modal-subtitle').textContent = `${cities.length} cidade${cities.length !== 1 ? 's' : ''} de atuação`;
  document.getElementById('modal-cities').innerHTML = cities.map(c => `<span class="city-tag">📍 ${c}</span>`).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function openClientsModal(row) {
  const name = row['nome'] || row['name'] || row['representante'] || '—';
  const clientsStr = row['clientes'] || row['clients'] || row['cliente'] || '';
  const clients = clientsStr.split(/[,;|]/).map(c => c.trim()).filter(Boolean);
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-subtitle').textContent = `${clients.length} cliente${clients.length !== 1 ? 's' : ''} vinculado${clients.length !== 1 ? 's' : ''}`;
  document.getElementById('modal-cities').innerHTML = clients.length > 0
    ? clients.map(c => `<span class="client-tag">🏪 ${c}</span>`).join('')
    : '<span class="no-data">Nenhum cliente cadastrado</span>';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ============================================================
// AUTO-REFRESH + COUNTDOWN + PROGRESS BAR
// ============================================================
function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => {
    fetchData().then(() => scheduleRefresh());
  }, REFRESH_INTERVAL);
}

function startProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  setTimeout(() => {
    bar.style.transition = `width ${REFRESH_INTERVAL / 1000}s linear`;
    bar.style.width = '0%';
  }, 100);
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  const el = document.getElementById('countdown');
  countdownTimer = setInterval(() => {
    const elapsed = Date.now() - progressStart;
    const remaining = Math.max(0, REFRESH_INTERVAL - elapsed);
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    if (el) el.textContent = `↻ ${mins}m ${secs.toString().padStart(2,'0')}s`;
    if (remaining <= 0) clearInterval(countdownTimer);
  }, 1000);
}

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('btn-refresh').addEventListener('click', () => {
  const icon = document.getElementById('refresh-icon');
  icon.innerHTML = '<span class="spinner"></span>';
  if (refreshTimer) clearTimeout(refreshTimer);
  fetchData().then(() => {
    icon.textContent = '🔄';
    scheduleRefresh();
  }).catch(() => { icon.textContent = '🔄'; });
});

document.getElementById('btn-retry').addEventListener('click', () => {
  fetchData().then(() => scheduleRefresh());
});

document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('filter-uf').value = '';
  document.getElementById('filter-func').value = '';
  document.getElementById('filter-region').value = '';
  renderCurrentView();
});

document.getElementById('filter-uf').addEventListener('change', renderCurrentView);
document.getElementById('filter-func').addEventListener('change', renderCurrentView);
document.getElementById('filter-region').addEventListener('change', renderCurrentView);

let searchDebounce = null;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    const q = e.target.value.trim();
    if (q.length >= 2) renderSearchResults(q);
    else if (q.length === 0) renderCurrentView();
  }, 300);
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ============================================================
// INICIALIZAÇÃO
// ============================================================
fetchData().then(() => scheduleRefresh());
</script>
</body>
</html>

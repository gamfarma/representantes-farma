<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GAM Farma — Rede de Representantes</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #0a2d6e;
  --primary-light: #1a4a9e;
  --accent: #FFB800;
  --purple: #8B5CF6;
  --bg: #f0f4f8;
  --surface: #fff;
  --border: #dde3ee;
  --text: #1a2340;
  --text-muted: #5a6a8a;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(10,45,110,0.10);
  --shadow-hover: 0 6px 24px rgba(10,45,110,0.18);
}
html { scroll-behavior: smooth; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
#app-header {
  background: linear-gradient(135deg, #0a2d6e 0%, #1a4a9e 60%, #0d3b8e 100%);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(10,45,110,0.25);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.logo-img {
  height: 54px;
  width: auto;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
}
.header-titles { flex: 1; min-width: 160px; }
.header-titles h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
.header-titles p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.header-search {
  flex: 2;
  min-width: 200px;
  max-width: 380px;
  position: relative;
}
.header-search input {
  width: 100%;
  padding: 9px 16px 9px 38px;
  border-radius: 24px;
  border: none;
  background: rgba(255,255,255,0.18);
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: background 0.2s;
}
.header-search input::placeholder { color: rgba(255,255,255,0.7); }
.header-search input:focus { background: rgba(255,255,255,0.28); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.7; font-size: 15px; pointer-events: none; }
.header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.btn-refresh {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-refresh:hover { background: rgba(255,255,255,0.28); }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.timestamp { font-size: 11px; opacity: 0.75; white-space: nowrap; }

/* FILTER BAR */
#filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
}
.filter-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.filter-label { font-size: 13px; font-weight: 700; color: var(--text-muted); }
.filter-select {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  min-width: 130px;
}
.btn-clear {
  background: #fee;
  color: #c62828;
  border: 1px solid #fcc;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-clear:hover { background: #fdd; }

/* BREADCRUMB */
#breadcrumb {
  max-width: 1400px;
  margin: 0 auto;
  padding: 12px 20px 0;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.bc-item { color: var(--primary); cursor: pointer; font-weight: 600; }
.bc-item:hover { text-decoration: underline; }
.bc-sep { color: #bbb; }
.bc-current { color: var(--text-muted); font-weight: 500; }

/* MAIN CONTENT */
#main-content {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 20px 60px;
}
.section-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
.section-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
.count-badge { background: var(--primary); color: #fff; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }

/* STATE GRID */
#states-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
}
.state-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
  box-shadow: var(--shadow);
  border-top: 4px solid var(--state-color);
  position: relative;
  overflow: hidden;
}
.state-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
.state-card::after {
  content: '';
  position: absolute;
  right: -20px; top: -20px;
  width: 80px; height: 80px;
  background: var(--state-color);
  opacity: 0.06;
  border-radius: 50%;
}
.state-sigla { font-size: 28px; font-weight: 900; color: var(--state-color); line-height: 1; }
.state-name { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }
.state-count { font-size: 11px; color: var(--text-muted); margin-top: 6px; opacity: 0.7; }

/* COORDINATORS GRID */
#coordinators-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.coord-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.coord-card:hover { box-shadow: var(--shadow-hover); }
.coord-header {
  padding: 16px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.coord-header::after {
  content: '';
  position: absolute;
  right: -20px; top: -20px;
  width: 100px; height: 100px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}
.coord-region-highlight {
  font-size: 17px;
  font-weight: 900;
  margin-bottom: 4px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  letter-spacing: 0.3px;
}
.coord-func { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.85; margin-bottom: 2px; }
.coord-name { font-size: 15px; font-weight: 700; line-height: 1.3; }
.coord-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
.coord-contact { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.coord-contact a { color: var(--primary); text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
.coord-contact a:hover { opacity: 0.7; text-decoration: underline; }
.contact-icon { font-size: 15px; flex-shrink: 0; }
.coord-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.members-count { font-size: 12px; color: var(--text-muted); }
.btn-team {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-team:hover { background: var(--primary-light); }

/* TEAM LEADER HEADER */
.team-leader-header {
  border-radius: var(--radius);
  padding: 20px 24px;
  color: #fff;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 16px;
  box-shadow: var(--shadow-hover);
  position: relative;
  overflow: hidden;
}
.team-leader-header::after {
  content: '';
  position: absolute;
  right: -30px; top: -30px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,0.07);
  border-radius: 50%;
}
.tlh-avatar {
  width: 56px; height: 56px;
  background: rgba(255,255,255,0.22);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 900;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.4);
}
.tlh-info-block { flex: 1; min-width: 200px; }
.tlh-region-highlight { font-size: 18px; font-weight: 900; margin-bottom: 2px; text-shadow: 0 1px 3px rgba(0,0,0,0.15); }
.tlh-func { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; }
.tlh-name { font-size: 22px; font-weight: 900; line-height: 1.2; margin-bottom: 4px; }
.tlh-region { font-size: 13px; opacity: 0.9; margin-bottom: 10px; }
.tlh-contacts { display: flex; flex-wrap: wrap; gap: 12px; }
.tlh-contact-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.tlh-contact-item a { color: rgba(255,255,255,0.92); text-decoration: none; font-weight: 600; transition: opacity 0.2s; }
.tlh-contact-item a:hover { opacity: 0.75; text-decoration: underline; }

/* TABLE */
.table-wrapper { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 13px; }
thead tr { background: var(--primary); color: #fff; }
th { padding: 12px 14px; text-align: left; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; white-space: nowrap; }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #f5f8ff; }
.func-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-rep { background: #e8f5e9; color: #1b5e20; }
.badge-cv { background: #e3f2fd; color: #0d47a1; }
.badge-tlv { background: #e3f2fd; color: #0d47a1; }
.badge-ger { background: #fce4ec; color: #880e4f; }
.badge-coord-med { background: #fff3e0; color: #bf360c; }
.badge-ded { background: #f3e5f5; color: #4a148c; }
.badge-coord { background: #e8eaf6; color: #1a237e; }
.badge-default { background: #eceff1; color: #37474f; }
.btn-cities {
  background: #e8f0fe;
  color: var(--primary);
  border: none;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.btn-cities:hover { background: #c5d8fc; }
.contact-link { color: var(--primary); text-decoration: none; font-weight: 500; }
.contact-link:hover { text-decoration: underline; }

/* BACK BUTTON */
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--primary);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 16px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow);
}
.btn-back:hover { background: #e8f0fe; box-shadow: var(--shadow-hover); }

/* MODAL */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,20,50,0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border-radius: 14px;
  padding: 28px;
  max-width: 520px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 12px 48px rgba(10,45,110,0.25);
  animation: modalIn 0.22s ease;
}
@keyframes modalIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--text-muted);
  line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: #c62828; }
.modal-title { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 4px; padding-right: 30px; }
.modal-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
.cities-container { display: flex; flex-wrap: wrap; gap: 8px; }
.city-tag {
  background: #e8f0fe;
  color: var(--primary);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
}

/* PROGRESS BAR */
#progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 3px;
  background: #4caf50;
  z-index: 9999;
  transition: width 1s linear;
  width: 100%;
}

/* EMPTY & LOADING */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 16px; font-weight: 600; }
#loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 14px; }
#loading-state .spinner { width: 36px; height: 36px; border-width: 3px; border-color: #ccc; border-top-color: var(--primary); }
#error-state { display: none; text-align: center; padding: 60px 20px; }

.district-label {
  font-size: 10px;
  background: rgba(255,255,255,0.22);
  border-radius: 6px;
  padding: 2px 7px;
  display: inline-block;
  margin-top: 4px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.no-data { color: #bbb; font-style: italic; font-size: 12px; }
.razao-social { font-size: 0.78em; color: #5a6a8a; font-style: italic; margin-top: 2px; }
.razao-social { font-size: 0.78em; color: #5a6a8a; font-style: italic; margin-top: 2px; }
.razao-social-coord { color: #fff; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .header-inner { padding: 10px 14px; gap: 10px; }
  .header-search { min-width: 100%; order: 3; }
  .logo-img { height: 40px; }
  #main-content { padding: 14px; }
  #states-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  #coordinators-grid { grid-template-columns: 1fr; }
  th, td { padding: 9px 10px; }
  .team-leader-header { padding: 16px; }
  .tlh-name { font-size: 18px; }
}
</style>
</head>

<!-- HEADER -->

</div>

<!-- BREADCRUMB -->
<div id="breadcrumb"></div>

<!-- MAIN CONTENT -->
<div id="main-content">

  <div id="error-state">

    <div class="empty-text" id="error-msg">Erro ao carregar dados</div>
    <button class="btn-team" id="btn-retry" style="margin-top:16px">Tentar novamente</button>
  </div>
  <div id="view-states" style="display:none"></div>
  <div id="view-coordinators" style="display:none"></div>
  <div id="view-team" style="display:none"></div>
  <div id="view-search" style="display:none"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" id="modal-close">&#10005;</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="cities-container" id="modal-cities"></div>
  </div>
</div>

// ============================================================
// CSV PARSER
// ============================================================
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  let headerIdx = -1;
  let updateDate = '';
  for (let i = 0; i < lines.length; i++) {
    const upper = lines[i].toUpperCase();
    if (upper.includes('DISTRITO') && (upper.includes('NOME') || upper.includes('REPRESENTANTE'))) { headerIdx = i; break; }
    const dateMatch = lines[i].match(/\d{2}\/\d{2}\/\d{4}/);
    if (dateMatch) updateDate = dateMatch[0];
  }
  if (headerIdx === -1) return { rows:[], updateDate };
  const rawHeaders = parseLine(lines[headerIdx]);
  const headers = rawHeaders.map(h => normalizeHeader(h));
  const rows = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cells = parseLine(lines[i]);
    const row = {};
    headers.forEach((h, idx) => { row[h] = (cells[idx] || '').trim(); });
    if (!row['NOME'] || row['NOME'] === '') continue;
    rows.push(row);
  }
  return { rows, updateDate };
}

function parseLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(current); current = '';
    } else { current += ch; }
  }
  result.push(current);
  return result;
}

function normalizeHeader(h) {
  let s = h.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().trim();
  s = s.replace(/COORPORATIVO/g,'CORPORATIVO').replace(/COODENADOR/g,'COORDENADOR');
  if (s === 'NOME REPRESENTANTE') s = 'NOME';
  if (s.includes('RAZAO') && s.includes('SOCIAL')) s = 'RAZAO SOCIAL';
  return s;
}

// ============================================================
// FIELD HELPERS
// ============================================================
function getFunc(row)   { return row['FUNCAO'] || row['FUNÇÃO'] || ''; }
function getRegion(row) { return row['REGIAO'] || row['REGIÃO'] || ''; }
function getPhone(row)  { return row['CONTATO CORPORATIVO'] || row['CONTATO COORPORATIVO'] || ''; }
function getEmail(row)  { return row['EMAIL'] || ''; }
function getCities(row) { return row['PRINCIPAIS CIDADES'] || ''; }
function getRazaoSocial(row) { return row['RAZAO SOCIAL'] || ''; }
function getName(row)   { return row['NOME'] || ''; }
function getUF(row)     { return (row['UF'] || '').trim(); }
function getDistrito(row) { return (row['DISTRITO'] || '').trim(); }

function isCoordEquipe(row) {
  const f = getFunc(row).toUpperCase();
  return f.includes('COORDENADOR EQUIPE') || f.includes('COORDENADOR DE EQUIPE');
}
function isGerenteProjetos(row) {
  return getFunc(row).toUpperCase().includes('GERENTE DE PROJETOS ESPECIAIS');
}
function isDedicado(row)       { return getFunc(row).toUpperCase().includes('DEDICADO'); }
function isGerenteContas(row)  { return getFunc(row).toLowerCase().includes('gerente de contas'); }
function isCoordContas(row) {
  const f = getFunc(row).toLowerCase();
  return f.includes('coordenador de contas') || f.includes('medias redes') || f.includes('médias redes');
}
function isClientRole(row)     { return isGerenteContas(row) || isCoordContas(row); }
function isRepComercial(row)   { return getFunc(row).toLowerCase().includes('representante comercial'); }

function getUFs(ufStr) {
  if (!ufStr || ufStr === '-' || ufStr.toUpperCase().includes('EXPANS')) return [];
  return ufStr.split(/[\/\-,\s]+/).map(s => s.trim().toUpperCase()).filter(s => s.length === 2 && /^[A-Z]{2}$/.test(s));
}

// PROCESS DATA
// ============================================================
function processData(rows) {
  const groups = [];
  const stateMap = {};

  // FIX: Glaucia Cardoso Belo pertence à equipe de Lucas Acyole, não Marcos
  rows.forEach(r => {
    const n = getName(r).trim().toUpperCase();
    if (n.includes('GLAUCIA') && n.includes('CARDOSO')) {
      r['_FORCE_COORD'] = 'LUCAS ACYOLE';
    }
  });

  // 1) Identificar coordenadores de equipe por DISTRITO
  const coordsByDist = {};
  rows.forEach(r => {
    if (isCoordEquipe(r)) {
      const dist = getDistrito(r);
      coordsByDist[dist] = r;
    }
  });

  // 2) Montar grupos: match por base do distrito
  const assignedRows = new Set();
  const groupMembers = {};
  Object.keys(coordsByDist).forEach(dist => {
    const leader = coordsByDist[dist];
    assignedRows.add(leader);
    groupMembers[dist] = [];
    const distParts = dist.split('/').map(p => p.trim());
    const distBases = distParts.map(p => { const n = parseInt(p); return isNaN(n) ? null : Math.floor(n/100)*100; }).filter(b => b !== null);
    rows.forEach(r => {
      if (r === leader || assignedRows.has(r)) return;
      if (isCoordEquipe(r) || isGerenteProjetos(r) || isDedicado(r) || isGerenteContas(r) || isCoordContas(r)) return;
      const rDist = getDistrito(r);
      if (rDist === '-' || rDist === '') return;
      const rDistNum = parseInt(rDist);
      if (isNaN(rDistNum)) return;
      const rBase = Math.floor(rDistNum/100)*100;
      if (distBases.includes(rBase)) {
        groupMembers[dist].push(r); assignedRows.add(r);
      }
    });
  });

  // Passo 2: fallback via coluna COORDENADOR (exceto rows com _FORCE_COORD)
  Object.keys(coordsByDist).forEach(dist => {
    const leader = coordsByDist[dist];
    const leaderNameUp = getName(leader).toUpperCase().trim();
    const leaderFirst = leaderNameUp.split(' ')[0];
    rows.forEach(r => {
      if (assignedRows.has(r)) return;
      if (isCoordEquipe(r) || isGerenteProjetos(r) || isDedicado(r) || isGerenteContas(r) || isCoordContas(r)) return;
      // Respeitar force override
      if (r['_FORCE_COORD']) {
        if (leaderFirst === r['_FORCE_COORD'] || leaderNameUp.startsWith(r['_FORCE_COORD'])) {
          groupMembers[dist].push(r); assignedRows.add(r);
        }
        return;
      }
      const coordCol = (r['COORDENADOR'] || '').toUpperCase().trim();
      if (coordCol && (coordCol === leaderNameUp || coordCol.startsWith(leaderFirst))) {
        groupMembers[dist].push(r); assignedRows.add(r);
      }
    });
  });

  // Construir objetos de grupo finais
  Object.keys(coordsByDist).forEach(dist => {
    const leader = coordsByDist[dist];
    const members = groupMembers[dist];
    const leaderUF = getUF(leader);
    const leaderRegion = getRegion(leader);

    // Determinar divisão
    let division = null;
    let displayRegion = leaderRegion;
    if (leaderUF === '-' || leaderRegion.toUpperCase().includes('TLV')) {
      division = 'Televendas';
      displayRegion = 'Televendas';
    } else if (leaderUF.toUpperCase().includes('EXPANS') || leaderRegion.toUpperCase().includes('EXPANS')) {
      division = 'Expansao';
      displayRegion = 'Centro Oeste e Sudeste';
    }

    groups.push({
      leader,
      members,
      distKey: dist,
      division,
      displayRegion,
      type: 'coordEquipe'
    });
  });

  // 3) Gerente de Projetos Especiais + Dedicados
  const gpeRow = rows.find(r => isGerenteProjetos(r));
  if (gpeRow) {
    assignedRows.add(gpeRow);
    const dedicados = rows.filter(r => isDedicado(r));
    dedicados.forEach(d => assignedRows.add(d));
    groups.push({
      leader: gpeRow,
      members: dedicados,
      distKey: 'PROJ_ESP',
      division: 'Projetos Especiais',
      displayRegion: 'SUL — PR / RS / SC',
      type: 'projetosEspeciais'
    });
  }

  // 4) Gerentes de Contas (individuais)
  rows.filter(r => isGerenteContas(r)).forEach(r => {
    assignedRows.add(r);
    groups.push({ leader:r, members:[], distKey:getDistrito(r), division:null, displayRegion:getRegion(r), type:'gerenteContas' });
  });

  // 5) Coordenadores de Contas Médias Redes (individuais)
  rows.filter(r => isCoordContas(r)).forEach(r => {
    assignedRows.add(r);
    groups.push({ leader:r, members:[], distKey:getDistrito(r), division:null, displayRegion:getRegion(r), type:'coordContas' });
  });

  // 6) Montar stateMap — por UF dos MEMBROS (não do líder de divisão)
  groups.forEach(group => {
    if (group.division) {
      // Divisões: aparecem somente nos estados onde há membros reais
      const memberUFs = new Set();
      group.members.forEach(m => getUFs(getUF(m)).forEach(u => memberUFs.add(u)));
      // Para Projetos Especiais, também incluir UFs dos dedicados
      memberUFs.forEach(uf => {
        if (!stateMap[uf]) stateMap[uf] = [];
        // Evitar duplicatas
        if (!stateMap[uf].find(g => g.distKey === group.distKey)) {
          stateMap[uf].push(group);
        }
      });
    } else {
      // Grupos regulares
      const leaderUFs = getUFs(getUF(group.leader));
      const memberUFs = new Set();
      leaderUFs.forEach(u => memberUFs.add(u));
      group.members.forEach(m => getUFs(getUF(m)).forEach(u => memberUFs.add(u)));
      memberUFs.forEach(uf => {
        if (!stateMap[uf]) stateMap[uf] = [];
        if (!stateMap[uf].find(g => g.distKey === group.distKey)) {
          stateMap[uf].push(group);
        }
      });
    }
  });

  return { groups, stateMap };
}

    clearTimeout(timeoutId);

    const text = await resp.text();
    const { rows, updateDate } = parseCSV(text);
    if (rows.length === 0) throw new Error('Nenhum dado encontrado na planilha.');
    const { groups, stateMap } = processData(rows);
    appData = { rows, groups, stateMap, updateDate };
    populateFilters();
    const now = new Date();
    document.getElementById('timestamp').textContent =
      `Atualizado: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    hideLoading();
    renderCurrentView();
    startProgressBar();
    scheduleRefresh();
 } catch(e) {
    // Fallback: tentar usar dados embarcados se o fetch remoto falhar
    if (typeof EMBEDDED_ROWS !== 'undefined' && EMBEDDED_ROWS.length > 0) {
        console.warn('Fetch remoto falhou, usando dados embarcados:', e.message);
        initWithRows(EMBEDDED_ROWS, EMBEDDED_DATE);
    } else {
        showError(e.message || 'Erro ao carregar dados');
    }
}
}

// ============================================================
// INITIALIZE WITH ROWS
// ============================================================
function initWithRows(rows, updateDate) {
  const { groups, stateMap } = processData(rows);
  appData = { rows, groups, stateMap, updateDate };
  populateFilters();
  const now = new Date();
  document.getElementById('timestamp').textContent =
    `Atualizado: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  hideLoading();
  renderCurrentView();
  startProgressBar();
  scheduleRefresh();
}

function populateFilters() {
  const ufSel = document.getElementById('filter-uf');
  const regionSel = document.getElementById('filter-region');
  const allUFs = new Set(Object.keys(appData.stateMap));
  const ufs = Array.from(allUFs).sort();
  ufSel.innerHTML = '<option value="">Todos os estados</option>';
  ufs.forEach(uf => {
    const opt = document.createElement('option');
    opt.value = uf;
    opt.textContent = `${uf} — ${STATE_NAMES[uf]||uf}`;
    ufSel.appendChild(opt);
  });
  const regions = new Set();
  appData.rows.forEach(r => {
    const reg = getRegion(r).trim();
    if (reg && reg !== '-') regions.add(reg);
  });
  regionSel.innerHTML = '<option value="">Todas as regiões</option>';
  Array.from(regions).sort().forEach(reg => {
    const opt = document.createElement('option');
    opt.value = reg.toLowerCase();
    opt.textContent = reg;
    regionSel.appendChild(opt);
  });
}

// ============================================================
// VIEWS — LOADING, ERROR
// ============================================================
function showLoading() {
  document.getElementById('loading-state').style.display = 'flex';
  document.getElementById('error-state').style.display = 'none';
  hideAllViews();
}
function hideLoading() { document.getElementById('loading-state').style.display = 'none'; }
function showError(msg) {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('error-state').style.display = 'block';
  document.getElementById('error-msg').textContent = msg || 'Erro desconhecido.';
}

function renderCurrentView() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  const filterUF = document.getElementById('filter-uf').value;
  const filterFunc = document.getElementById('filter-func').value.toLowerCase();
  const filterRegion = document.getElementById('filter-region').value.toLowerCase();
  const hasFilter = query || filterFunc || filterRegion;
  if (hasFilter || (query && filterUF)) { renderSearchResults(query, filterUF, filterFunc, filterRegion); return; }
  if (filterUF && !hasFilter) { navigateToState(filterUF); return; }
  if (currentView === 'states') renderStates();
  else if (currentView === 'coordinators') renderCoordinators(currentState);
  else if (currentView === 'team') renderTeam(currentGroup, currentState);
}

// ============================================================
// VIEW 1 — HOME (States)
// ============================================================
function renderStates() {
  currentView = 'states';
  hideAllViews();
  updateBreadcrumb([{ label:'Início' }]);
  const container = document.getElementById('view-states');
  container.style.display = 'block';
  const ufs = Object.keys(appData.stateMap).filter(uf => appData.stateMap[uf].length > 0).sort();

  let html = `
    <div class="section-title">&#128506;&#65039; Cobertura Comercial <span class="count-badge">${ufs.length}</span></div>
    <p class="section-sub">Selecione um estado para ver coordenadores e equipes.</p>
    <div id="states-grid">`;

  ufs.forEach(uf => {
    const groups = appData.stateMap[uf];
    const total = groups.length;
    const color = STATE_COLORS[uf] || STATE_COLORS.DEFAULT;
    const name = STATE_NAMES[uf] || uf;
    html += `
      <div class="state-card" style="--state-color:${color}" onclick="navigateToState('${uf}')" title="${name}">
        <div class="state-sigla">${uf}</div>

// ============================================================
// VIEW 2 — COORDINATORS (State)
// ============================================================
function navigateToState(uf) {
  currentView = 'coordinators';
  currentState = uf;
  document.getElementById('filter-uf').value = uf;
  renderCoordinators(uf);
}

function renderCoordinators(uf) {
  hideAllViews();
  updateBreadcrumb([
    { label:'Início', action:'goHome' },
    { label:`${uf} — ${STATE_NAMES[uf]||uf}` }
  ]);
  const container = document.getElementById('view-coordinators');
  container.style.display = 'block';
  const groups = appData.stateMap[uf] || [];
  const color = STATE_COLORS[uf] || STATE_COLORS.DEFAULT;

  let html = `
    <button class="btn-back" onclick="goHome()">&#8592; Voltar</button>
    <div class="section-title" style="color:${color}">
      ${uf} — ${STATE_NAMES[uf]||uf}
      <span class="count-badge" style="background:${color}">${groups.length} grupo${groups.length!==1?'s':''}</span>
    </div>
    <p class="section-sub">Coordenadores, gerentes e representantes com atuação neste estado.</p>
    <div id="coordinators-grid">`;

  if (groups.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">&#128269;</div><div class="empty-text">Nenhum grupo encontrado para este estado.</div></div>`;
  } else {
    groups.forEach(group => { html += renderCoordCard(group, uf); });
  }

  html += '</div>';
  container.innerHTML = html;
}

function renderCoordCard(group, uf) {
  const leader = group.leader;
  if (!leader) return '';
  const func = getFunc(leader);
  const phone = getPhone(leader);
  const email = getEmail(leader);
  let region = group.displayRegion || getRegion(leader);
  if (!region || region === '-') region = getRegion(leader);

  const headerColor = group.division
    ? (DIVISION_COLORS[group.division] || '#8B5CF6')
    : getHeaderColor(func, uf);

  const isClient = isClientRole(leader);

  // Contar membros do estado atual
  const memberCount = (uf && group.members.length > 0)
    ? group.members.filter(m => {
        const mUFs = getUFs(getUF(m));
        return mUFs.length === 0 || mUFs.includes(uf);
      }).length
    : group.members.length;

  let html = `<div class="coord-card">
    <div class="coord-header" style="background:${headerColor}">`;

  if (region && region !== '-') {
    html += `<div class="coord-region-highlight">&#128205; ${region}</div>`;
  }
  if (group.division) {
    html += `<div style="display:inline-block;background:rgba(255,255,255,0.25);color:#fff;font-size:11px;padding:2px 10px;border-radius:20px;margin-bottom:4px;font-weight:600;">${group.division}</div>`;
  }
  html += `<div class="coord-func">${func}</div>
      <div class="coord-name">${getName(leader)}</div>
    ${getRazaoSocial(leader) && getRazaoSocial(leader) !== '-' && getRazaoSocial(leader) !== '' ? `<div class="razao-social razao-social-coord">🏢 ${getRazaoSocial(leader)}</div>` : ''}
      <span class="district-label">Distrito ${group.distKey}</span>
    </div>
    <div class="coord-body">
      ${phone
        ? `<div class="coord-contact"><span class="contact-icon">&#128241;</span><a href="tel:${phone.replace(/\D/g,'')}">${phone}</a></div>`
        : `<div class="coord-contact"><span class="contact-icon">&#128241;</span><span class="no-data">Sem contato</span></div>`}
      ${email
        ? `<div class="coord-contact"><span class="contact-icon">&#9993;&#65039;</span><a href="mailto:${email}">${email}</a></div>`
        : `<div class="coord-contact"><span class="contact-icon">&#9993;&#65039;</span><span class="no-data">Sem e-mail</span></div>`}
    </div>
    <div class="coord-footer">`;

  if (isClient) {
    html += `<span class="members-count">Atua individualmente</span>`;
  } else if (memberCount > 0 || group.members.length > 0) {
    html += `<span class="members-count">&#128101; ${memberCount} membro${memberCount!==1?'s':''}</span>
      <button class="btn-team" onclick="navigateToTeam('${escapeAttr(group.distKey)}','${escapeAttr(uf||currentState||'')}')">Ver equipe &#8594;</button>`;
  } else {
    html += `<span class="members-count">&#128101; Sem membros</span>`;
  }

  html += `</div></div>`;
  return html;
}

function getHeaderColor(func, uf) {
  const f = func.toLowerCase();
  if (f.includes('projetos especiais')) return '#2e7d32';
  if (f.includes('gerente de contas')) return '#ad1457';
  if (f.includes('medias redes') || f.includes('médias redes')) return '#e65100';
  if (uf && STATE_COLORS[uf]) return STATE_COLORS[uf];
  return STATE_COLORS.DEFAULT;
}

// ============================================================
// VIEW 3 — TEAM DETAIL
// ============================================================
function navigateToTeam(distKey, fromState) {
  const group = appData.groups.find(g => g.distKey === distKey);
  if (!group) return;
  currentView = 'team';
  currentGroup = group;
  currentState = fromState;
  renderTeam(group, fromState);
}

function renderTeam(group, fromState) {
  if (!group) return;
  hideAllViews();
  const leaderName = group.leader ? getName(group.leader) : 'Equipe';
  updateBreadcrumb([
    { label:'Início', action:'goHome' },
    fromState && STATE_NAMES[fromState]
      ? { label:`${fromState} — ${STATE_NAMES[fromState]}`, action:`navigateToState_bc_${fromState}` }
      : { label:group.division||leaderName, action:`navigateToState_bc_${fromState||''}` },
    { label:leaderName }
  ]);
  const container = document.getElementById('view-team');
  container.style.display = 'block';
  const color = group.division
    ? (DIVISION_COLORS[group.division] || '#8B5CF6')
    : (STATE_COLORS[fromState] || STATE_COLORS.DEFAULT);

  const backAction = fromState && STATE_NAMES[fromState]
    ? `navigateToState('${escapeAttr(fromState)}')`
    : `goHome()`;

  let html = `<button class="btn-back" onclick="${backAction}">&#8592; Voltar</button>`;

  // CABEÇALHO DO LÍDER
  if (group.leader) {
    const ldr = group.leader;
    const lFunc = getFunc(ldr);
    const lPhone = getPhone(ldr);
    const lEmail = getEmail(ldr);
    const lRegion = group.displayRegion || getRegion(ldr);
    const initials = getName(ldr).split(' ').filter(w=>w.length>2).slice(0,2).map(w=>w[0]).join('').toUpperCase();
    html += `
      <div class="team-leader-header" style="background:linear-gradient(135deg,${color} 0%,${color}cc 100%)">
        <div class="tlh-avatar">${initials}</div>
        <div class="tlh-info-block">
          ${lRegion && lRegion !== '-' ? `<div class="tlh-region-highlight">&#128205; ${lRegion}</div>` : ''}
          <div class="tlh-func">${lFunc}</div>
          <div class="tlh-name">${getName(ldr)}</div>
          <div class="tlh-contacts">
            ${lPhone ? `<div class="tlh-contact-item"><span>&#128241;</span><a href="tel:${lPhone.replace(/\D/g,'')}">${lPhone}</a></div>` : ''}
            ${lEmail ? `<div class="tlh-contact-item"><span>&#9993;&#65039;</span><a href="mailto:${lEmail}">${lEmail}</a></div>` : ''}
          </div>
        </div>
      </div>`;
  }

  // Filtrar membros pelo estado atual quando grupo é de divisão com membros em múltiplos estados
  let members = group.members;
  if (fromState && STATE_NAMES[fromState]) {
    members = group.members.filter(m => {
      const mUFs = getUFs(getUF(m));
      return mUFs.length === 0 || mUFs.includes(fromState);
    });
  }

  html += `
    <div class="section-title" style="color:${color}">
      &#128101; Equipe de ${leaderName}
      <span class="count-badge" style="background:${color}">${members.length} membro${members.length!==1?'s':''}</span>
    </div>
    <p class="section-sub">${group.distKey !== 'PROJ_ESP' ? 'Distrito ' + group.distKey : 'Projetos Especiais — SUL'}${fromState ? ' · ' + fromState : ''}</p>`;

  if (members.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">&#128100;</div><div class="empty-text">Nenhum membro para este estado.</div></div>`;
  } else {
    html += `
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Função</th>
              <th>Contato Corporativo</th>
              <th>E-mail</th>
              <th>UF</th>
              <th>Região</th>
              <th>Principais Cidades</th>
            </tr>
          </thead>
          <tbody>`;

    members.forEach(m => {
      const func = getFunc(m);
      const badge = getFuncBadge(func);
      const phone = getPhone(m);
      const email = getEmail(m);
      const region = getRegion(m);
      const cities = getCities(m);
      const nome = getName(m);
      const uf = getUF(m);
      const razao = getRazaoSocial(m);
      const isRC = isRepComercial(m);
      const isClient = isClientRole(m);

      let citiesBtn = '<span class="no-data">—</span>';
      if (cities && cities !== '-' && !isClient) {
        citiesBtn = `<button class="btn-cities" onclick="openCitiesModal('${escapeAttr(nome)}','${escapeAttr(region)}','${escapeAttr(cities)}')">&#128205; Cidades</button>`;
      }

      html += `
            <tr>
              <td>
                <div style="font-weight:700;margin-bottom:2px">${nome}</div>
                ${isRC && razao && razao !== '-' && razao !== '' ? `<div class="razao-social">&#127970; ${razao}</div>` : ''}
              </td>
              <td><span class="func-badge ${badge.cls}">${badge.label}</span></td>
              <td>${phone ? `<a class="contact-link" href="tel:${phone.replace(/\D/g,'')}">${phone}</a>` : '<span class="no-data">—</span>'}</td>
              <td>${email ? `<a class="contact-link" href="mailto:${email}">${email}</a>` : '<span class="no-data">—</span>'}</td>
              <td>${uf || '—'}</td>
              <td>${region || '<span class="no-data">—</span>'}</td>
              <td>${citiesBtn}</td>
            </tr>`;
    });
    html += '</tbody></table></div>';
  }
  container.innerHTML = html;
}

function getFuncBadge(func) {
  const f = func.toLowerCase();
  if (f.includes('representante comercial')) return { cls:'badge-rep', label:'Representante Comercial' };
  if (f.includes('consultor de vendas'))     return { cls:'badge-cv',  label:'Consultor de Vendas' };
  if (f.includes('televendas'))              return { cls:'badge-tlv', label:'Televendas' };
  if (f.includes('gerente de contas'))       return { cls:'badge-ger', label:'Gerente de Contas' };
  if (f.includes('medias redes') || f.includes('médias redes')) return { cls:'badge-coord-med', label:'Coordenador de Médias Redes' };
  if (f.includes('dedicado'))                return { cls:'badge-ded', label:'Dedicado' };
  if (f.includes('coordenador'))             return { cls:'badge-coord', label:'Coordenador' };
  return { cls:'badge-default', label:func||'—' };
}

// ============================================================
// SEARCH RESULTS
// ============================================================
function renderSearchResults(query, filterUF, filterFunc, filterRegion) {
  hideAllViews();
  updateBreadcrumb([
    { label:'Início', action:'goHome' },
    { label:'Resultados da busca' }
  ]);
  const container = document.getElementById('view-search');
  container.style.display = 'block';

  let results = appData.rows.filter(r => {
    const nome = getName(r).toLowerCase();
    const uf = getUF(r).toUpperCase();
    const func = getFunc(r).toLowerCase();
    const region = getRegion(r).toLowerCase();
    const cities = getCities(r).toLowerCase();
    const razao = getRazaoSocial(r).toLowerCase();
    if (query && !nome.includes(query) && !cities.includes(query) && !region.includes(query) && !razao.includes(query)) return false;
    if (filterUF) {
      const rowUFs = getUFs(uf);
      if (!rowUFs.includes(filterUF) && !uf.includes(filterUF)) return false;
    }
    if (filterFunc && !func.includes(filterFunc)) return false;
    if (filterRegion && !region.includes(filterRegion)) return false;
    return true;
  });

  let html = `
    <div class="section-title">&#128269; Resultados <span class="count-badge">${results.length}</span></div>
    <p class="section-sub">${results.length} resultado${results.length!==1?'s':''} encontrado${results.length!==1?'s':''}.</p>`;

  if (results.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">&#128269;</div><div class="empty-text">Nenhum resultado encontrado.</div></div>`;
  } else {
    html += `
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Nome</th><th>Função</th><th>UF</th><th>Região</th><th>Contato</th><th>E-mail</th><th>Principais Cidades</th></tr></thead>
          <tbody>`;
    results.forEach(r => {
      const func = getFunc(r);
      const badge = getFuncBadge(func);
      const phone = getPhone(r);
      const email = getEmail(r);
      const region = getRegion(r);
      const cities = getCities(r);
      const uf = getUF(r);
      const nome = getName(r);
      const razao = getRazaoSocial(r);
      const isRC = isRepComercial(r);
      const isClient = isClientRole(r);
      let citiesBtn = '<span class="no-data">—</span>';
      if (cities && cities !== '-' && !isClient) {
        citiesBtn = `<button class="btn-cities" onclick="openCitiesModal('${escapeAttr(nome)}','${escapeAttr(region)}','${escapeAttr(cities)}')">&#128205; Cidades</button>`;
      }
      html += `
            <tr>
              <td>
                <strong>${nome}</strong>
                ${isRC && razao && razao !== '-' && razao !== '' ? `<div class="razao-social">&#127970; ${razao}</div>` : ''}
              </td>
              <td><span class="func-badge ${badge.cls}">${badge.label}</span></td>
              <td>${uf}</td>
              <td>${region||'<span class="no-data">—</span>'}</td>
              <td>${phone?`<a class="contact-link" href="tel:${phone.replace(/\D/g,'')}">${phone}</a>`:'<span class="no-data">—</span>'}</td>
              <td>${email?`<a class="contact-link" href="mailto:${email}">${email}</a>`:'<span class="no-data">—</span>'}</td>
              <td>${citiesBtn}</td>
            </tr>`;
    });
    html += '</tbody></table></div>';
  }
  container.innerHTML = html;
}

// ============================================================
// NAVIGATION
// ============================================================
function goHome() {
  currentView = 'states'; currentState = null; currentGroup = null;
  document.getElementById('filter-uf').value = '';
  document.getElementById('filter-func').value = '';
  document.getElementById('filter-region').value = '';
  document.getElementById('search-input').value = '';
  renderStates();
}

function hideAllViews() {
  ['view-states','view-coordinators','view-team','view-search'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

function updateBreadcrumb(items) {
  const bc = document.getElementById('breadcrumb');
  if (items.length <= 1 && items[0].label === 'Início') { bc.innerHTML = ''; return; }
  let html = '';
  items.forEach((item, i) => {
    if (i > 0) html += '<span class="bc-sep">&#8250;</span>';
    if (i === items.length - 1) {
      html += `<span class="bc-current">${item.label}</span>`;
    } else if (item.action === 'goHome') {
      html += `<span class="bc-item" onclick="goHome()">${item.label}</span>`;
    } else if (item.action && item.action.startsWith('navigateToState_bc_')) {
      const st = item.action.replace('navigateToState_bc_','');
      html += `<span class="bc-item" onclick="navigateToState('${escapeAttr(st)}')">${item.label}</span>`;
    } else {
      html += `<span class="bc-item" onclick="goHome()">${item.label}</span>`;
    }
  });
  bc.innerHTML = html;
}

// MODALS
// ============================================================
function openCitiesModal(nome, region, citiesStr) {
  document.getElementById('modal-title').textContent = nome;
  document.getElementById('modal-subtitle').textContent = `Principais cidades${region?' — '+region:''}`;
  const cities = citiesStr.split(/[,;]+/).map(c=>c.trim()).filter(c=>c&&c!=='-');
  document.getElementById('modal-cities').innerHTML =
    cities.length > 0
      ? cities.map(c=>`<span class="city-tag">${c}</span>`).join('')
      : '<span class="no-data">Nenhuma cidade cadastrada.</span>';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ============================================================
// AUTO-REFRESH & PROGRESS BAR
// ============================================================
function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => { fetchData(false); }, REFRESH_INTERVAL);
}

function startProgressBar() {
  const bar = document.getElementById('progress-bar');
  progressStart = Date.now();
  if (progressTimer) clearInterval(progressTimer);
  bar.style.transition = 'none';
  bar.style.width = '100%';
  progressTimer = setInterval(() => {
    const elapsed = Date.now() - progressStart;
    const remaining = Math.max(0, 1 - elapsed / REFRESH_INTERVAL);
    bar.style.transition = 'width 1s linear';
    bar.style.width = (remaining * 100) + '%';
    if (remaining <= 0) clearInterval(progressTimer);
  }, 1000);
}

// ============================================================
// REFRESH BUTTON
// ============================================================
document.getElementById('btn-refresh').addEventListener('click', () => {
  const icon = document.getElementById('refresh-icon');
  icon.outerHTML = '<span class="spinner" id="refresh-icon"></span>';
  if (refreshTimer) clearTimeout(refreshTimer);
  if (progressTimer) clearInterval(progressTimer);
  fetchData(true).finally(() => {
    const spinner = document.getElementById('refresh-icon');
    if (spinner) spinner.outerHTML = '<span id="refresh-icon">&#128260;</span>';
  });
});
document.getElementById('btn-retry').addEventListener('click', () => fetchData(true));

// ============================================================
// FILTERS & SEARCH
// ============================================================
let searchDebounce = null;
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => { if (appData.rows.length > 0) renderCurrentView(); }, 300);
});
document.getElementById('filter-uf').addEventListener('change', () => { if (appData.rows.length>0) renderCurrentView(); });
document.getElementById('filter-func').addEventListener('change', () => { if (appData.rows.length>0) renderCurrentView(); });
document.getElementById('filter-region').addEventListener('change', () => { if (appData.rows.length>0) renderCurrentView(); });
document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-uf').value = '';
  document.getElementById('filter-func').value = '';
  document.getElementById('filter-region').value = '';
  if (appData.rows.length > 0) goHome();
});

function escapeAttr(str) {
  return (str||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ');
}

fetchData(false);
</script>

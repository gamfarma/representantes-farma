<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rede de Representantes GAM Farma</title>
  <style>
    :root {
      --primary: #003087;
      --primary-light: #1a4fad;
      --accent: #e8213c;
      --bg: #f4f6fb;
      --card-bg: #fff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e2e8f0;
      --shadow: 0 2px 12px rgba(0,48,135,0.10);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, #001a5e 100%);
      color: #fff;
      padding: 20px 32px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-logo { display: flex; align-items: center; gap: 18px; }
    .header-logo img { height: 48px; object-fit: contain; }
    .header-title h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    .header-title p { font-size: 0.85rem; opacity: 0.7; margin-top: 2px; }
    .header-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .update-info { font-size: 0.78rem; opacity: 0.7; }
    .btn-refresh {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-refresh:hover { background: rgba(255,255,255,0.28); }

    /* SEARCH & FILTERS */
    .controls {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      gap: 8px;
      flex: 1;
      min-width: 220px;
    }
    .search-box input {
      border: none;
      background: transparent;
      font-size: 0.9rem;
      color: var(--text);
      width: 100%;
      outline: none;
    }
    .search-box svg { color: var(--muted); flex-shrink: 0; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; }
    .filters select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
      outline: none;
      min-width: 140px;
    }
    .btn-clear {
      background: none;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-clear:hover { background: var(--accent); color: #fff; }

    /* MAIN */
    main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    /* STATUS BAR */
    .status-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat-badge {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow);
    }
    .stat-badge strong { color: var(--primary); font-size: 1rem; }

    /* SECTION TITLE */
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 28px 0 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* STATE GRID */
    .states-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 12px;
    }
    .state-card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px 16px;
      cursor: pointer;
      text-align: center;
      transition: all 0.22s ease;
      box-shadow: var(--shadow);
      position: relative;
    }
    .state-card:hover {
      border-color: var(--primary-light);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,48,135,0.18);
    }
    .state-card.active {
      border-color: var(--primary);
      background: linear-gradient(135deg, #e8eeff 0%, #f4f6ff 100%);
    }
    .state-card.division-card { border-color: #f59e0b; }
    .state-card.division-card:hover { border-color: #d97706; }
    .state-card.division-card.active { background: linear-gradient(135deg, #fef3c7 0%, #fffbeb 100%); border-color: #d97706; }
    .state-card .state-sigla {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 6px;
    }
    .state-card.division-card .state-sigla { color: #92400e; }
    .state-card .state-name { font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .state-badge {
      background: var(--primary);
      color: #fff;
      border-radius: 20px;
      font-size: 0.7rem;
      padding: 2px 10px;
      font-weight: 600;
      display: inline-block;
    }
    .state-card.division-card .state-badge { background: #92400e; }

    /* COORDINATOR PANEL */
    .coord-panel {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin: 8px 0 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: none;
    }
    .coord-panel.visible { display: block; }
    .coord-panel-header {
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .coord-panel-header h3 { font-size: 1rem; font-weight: 700; }
    .coord-panel-close {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .coord-list { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* COORDINATOR CARD */
    .coord-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .coord-card:hover { box-shadow: 0 4px 16px rgba(0,48,135,0.12); }
    .coord-card-header {
      background: linear-gradient(90deg, #e8eeff 0%, #f4f6ff 100%);
      border-bottom: 1.5px solid var(--border);
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .coord-card-header .coord-region-label {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .coord-card-header .coord-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }
    .coord-card-header .coord-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .coord-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .coord-meta-item a { color: var(--primary); text-decoration: none; }
    .coord-meta-item a:hover { text-decoration: underline; }
    .coord-expand-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .coord-expand-btn:hover { background: var(--primary-light); }
    .coord-func-badge {
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .badge-coord { background: #dbeafe; color: #1e40af; }
    .badge-gerente { background: #d1fae5; color: #065f46; }
    .badge-coord-contas { background: #fef3c7; color: #92400e; }
    .badge-gpe { background: #ede9fe; color: #5b21b6; }
    .badge-dedicado { background: #fce7f3; color: #9d174d; }
    .badge-rep { background: #dcfce7; color: #166534; }
    .badge-consult { background: #e0f2fe; color: #0369a1; }
    .badge-tlv { background: #fef9c3; color: #713f12; }

    /* TEAM LIST */
    .team-section { display: none; }
    .team-section.visible { display: block; }
    .team-header {
      background: var(--primary);
      color: #fff;
      padding: 10px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
      padding: 14px;
    }
    .member-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      transition: box-shadow 0.18s;
    }
    .member-card:hover { box-shadow: 0 3px 12px rgba(0,48,135,0.10); }
    .member-region {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .member-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
    .member-razao { font-size: 0.75rem; color: var(--muted); font-style: italic; margin-bottom: 6px; }
    .member-contacts { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .member-contact-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .member-contact-item a { color: var(--primary); text-decoration: none; }
    .member-contact-item a:hover { text-decoration: underline; }
    .btn-cities {
      background: none;
      border: 1.5px solid var(--primary);
      color: var(--primary);
      border-radius: 7px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      margin-top: 4px;
    }
    .btn-cities:hover { background: var(--primary); color: #fff; }
    .cities-list {
      display: none;
      margin-top: 8px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .cities-list.visible { display: block; }

    /* INDIVIDUAL (Gerente/Coord Contas) */
    .individual-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    .individual-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }
    .individual-card:hover { box-shadow: 0 6px 20px rgba(0,48,135,0.12); }
    .individual-region {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .individual-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .individual-contacts { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }

    /* PROJETOS ESPECIAIS */
    .pe-card {
      background: linear-gradient(135deg, #ede9fe 0%, #f5f3ff 100%);
      border: 2px solid #c4b5fd;
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .pe-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #c4b5fd;
      cursor: pointer;
    }
    .pe-region { font-size: 1.15rem; font-weight: 800; color: #5b21b6; text-transform: uppercase; margin-bottom: 4px; }
    .pe-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }

    /* LOADING / ERROR */
    .loading-state, .error-state {
      text-align: center;
      padding: 60px 24px;
      display: none;
    }
    .loading-state.visible, .error-state.visible { display: block; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }

    @media (max-width: 600px) {
      main { padding: 16px; }
      .controls { padding: 12px 16px; }
      header { padding: 14px 16px; }
      .states-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <img src="https://raw.githubusercontent.com/gamfarma/imagem-site/2091104c3fa6efcc97594176ed36b38218ffa0f2/Logo%20GAM%20Nova%20Branca.png"
         alt="GAM Farma" onerror="this.style.display='none'"/>
    <div class="header-title">
      <h1>Rede de Representantes</h1>
      <p>Diretório comercial interativo</p>
    </div>
  </div>
  <div class="header-meta">
    <span class="update-info" id="updateInfo">Carregando...</span>
    <button class="btn-refresh" onclick="forceRefresh()">🔄 Atualizar</button>
  </div>
</header>

<div class="controls">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Buscar por nome, região ou cidade..." oninput="applyFilters()"/>
  </div>
  <div class="filters">
    <select id="filterUF" onchange="applyFilters()"><option value="">Todos os estados</option></select>
    <select id="filterFunc" onchange="applyFilters()">
      <option value="">Todas as funções</option>
      <option value="COORDENADOR_EQUIPE">Coordenador de Equipe</option>
      <option value="REPRESENTANTE_COMERCIAL">Representante Comercial</option>
      <option value="CONSULTOR_VENDAS">Consultor de Vendas</option>
      <option value="GERENTE_CONTAS">Gerente de Contas</option>
      <option value="COORDENADOR_CONTAS">Coord. Médias Redes</option>
      <option value="GERENTE_PROJETOS_ESPECIAIS">Gerente Proj. Especiais</option>
      <option value="DEDICADO">Dedicados</option>
    </select>
    <select id="filterRegiao" onchange="applyFilters()"><option value="">Todas as regiões</option></select>
    <button class="btn-clear" onclick="clearFilters()">✕ Limpar</button>
  </div>
</div>

<main>
  <div class="loading-state visible" id="loadingState">
    <div class="spinner"></div>
    <p>Carregando dados da planilha…</p>
  </div>
  <div class="error-state" id="errorState">
    <p style="font-size:2rem">⚠️</p>
    <p style="font-weight:600;margin:8px 0">Erro ao carregar dados</p>
    <button class="btn-refresh" onclick="forceRefresh()" style="margin:0 auto;display:inline-flex">Tentar novamente</button>
  </div>
  <div id="appContent" style="display:none">
    <div class="status-bar" id="statusBar"></div>

    <!-- ESTADOS NORMAIS -->
    <div class="section-title">📍 Estados</div>
    <div class="states-grid" id="statesGrid"></div>
    <div id="statesPanels"></div>

    <!-- DIVISÕES ESPECIAIS (TLV / EXPANSÃO) -->
    <div class="section-title" id="divSectionTitle" style="display:none">🗂️ Divisões Especiais</div>
    <div class="states-grid" id="divisionsGrid"></div>
    <div id="divisionsPanels"></div>

    <!-- GERENTES DE CONTAS -->
    <div class="section-title" id="gcSectionTitle" style="display:none">🏢 Gerentes de Contas</div>
    <div class="individual-grid" id="gerentesGrid"></div>

    <!-- COORDENADORES DE CONTAS MÉDIAS REDES -->
    <div class="section-title" id="ccSectionTitle" style="display:none">🔗 Coordenadores de Contas – Médias Redes</div>
    <div class="individual-grid" id="coordContasGrid"></div>

    <!-- PROJETOS ESPECIAIS -->
    <div class="section-title" id="peSectionTitle" style="display:none">⭐ Projetos Especiais</div>
    <div id="projetosGrid"></div>

    <div class="empty-state" id="emptyState" style="display:none">
      <p style="font-size:2rem">🔍</p>
      <p>Nenhum resultado encontrado para sua busca.</p>
    </div>
  </div>
</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQJRPejEYUGjqFiruPTGJuS2Itk6qjvyk6moB4_ChCe5_z4_CW0jYcYXJFimYYw4kGcbP2fpdRccLkq/pub?output=csv";
let DATA = null;
let REFRESH_TIMER = null;
const REFRESH_INTERVAL = 5 * 60 * 1000;

const STATE_NAMES = {
  SC:'Santa Catarina',RS:'Rio Grande do Sul',PR:'Paraná',SP:'São Paulo',
  MS:'Mato Grosso do Sul',MT:'Mato Grosso',GO:'Goiás',DF:'Distrito Federal',
  MG:'Minas Gerais',RJ:'Rio de Janeiro',BA:'Bahia',ES:'Espírito Santo',
  TLV:'Televendas',EXPANSÃO:'Expansão'
};

function getBadgeClass(cat){
  const m = {
    COORDENADOR_EQUIPE:'badge-coord',GERENTE_CONTAS:'badge-gerente',
    COORDENADOR_CONTAS:'badge-coord-contas',GERENTE_PROJETOS_ESPECIAIS:'badge-gpe',
    DEDICADO:'badge-dedicado',REPRESENTANTE_COMERCIAL:'badge-rep',
    CONSULTOR_VENDAS:'badge-consult',OUTRO:'badge-consult'
  };
  return m[cat]||'badge-consult';
}
function getFuncLabel(cat){
  const m = {
    COORDENADOR_EQUIPE:'Coord. Equipe',GERENTE_CONTAS:'Gerente de Contas',
    COORDENADOR_CONTAS:'Coord. Médias Redes',GERENTE_PROJETOS_ESPECIAIS:'Ger. Proj. Especiais',
    DEDICADO:'Dedicado',REPRESENTANTE_COMERCIAL:'Rep. Comercial',
    CONSULTOR_VENDAS:'Consultor de Vendas',OUTRO:'Outro'
  };
  return m[cat]||cat;
}
function classifyFunc(funcao){
  const f=funcao.toUpperCase().trim();
  if(f.includes('COORDENADOR EQUIPE')||f.includes('COORDENADOR DE EQUIPE'))return'COORDENADOR_EQUIPE';
  if(f.includes('CONSULTOR DE VENDAS'))return'CONSULTOR_VENDAS';
  if(f.includes('REPRESENTANTE COMERCIAL'))return'REPRESENTANTE_COMERCIAL';
  if(f.includes('GERENTE DE CONTAS'))return'GERENTE_CONTAS';
  if(f.includes('COORDENADOR DE CONTAS')||f.includes('MÉDIAS REDES')||f.includes('MEDIAS REDES'))return'COORDENADOR_CONTAS';
  if(f.includes('GERENTE DE PROJETOS ESPECIAIS'))return'GERENTE_PROJETOS_ESPECIAIS';
  if(f.includes('DEDICADO'))return'DEDICADO';
  return'OUTRO';
}

function contactLink(tel){
  if(!tel||tel==='-')return'—';
  const clean=tel.replace(/\D/g,'');
  return `<a href="tel:+55${clean}">${tel}</a>`;
}
function emailLink(email){
  if(!email||email==='-')return'—';
  return `<a href="mailto:${email}">${email}</a>`;
}

// ─── PARSE CSV ───────────────────────────────────────────────
function parseCSV(text){
  const lines=text.split('\n');
  let headerIdx=-1;
  let updateDate='';
  for(let i=0;i<lines.length;i++){
    const up=lines[i].toUpperCase();
    if(up.includes('DISTRITO')&&(up.includes('NOME')||up.includes('REPRESENTANTE'))){headerIdx=i;break;}
    const dm=lines[i].match(/\d{2}\/\d{2}\/\d{4}/);
    if(dm)updateDate=dm[0];
  }
  if(headerIdx===-1)throw new Error('Cabeçalho não encontrado');

  function parseRow(line){
    const res=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){res.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    res.push(cur.trim());
    return res;
  }

  const rawHeaders=parseRow(lines[headerIdx]);
  const headers=rawHeaders.map(h=>h.replace(/['"]/g,'').trim().toUpperCase()
    .replace('COORPORATIVO','CORPORATIVO').replace('COODENADOR','COORDENADOR')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,''));

  const colMap={};
  headers.forEach((h,i)=>{
    if(h.includes('DISTRITO')&&!h.includes('SETOR'))colMap.DISTRITO=i;
    else if(h==='SETOR')colMap.SETOR=i;
    else if(h.includes('REGI')&&!h.includes('COORD'))colMap.REGIAO=i;
    else if(h==='UF')colMap.UF=i;
    else if(h.includes('PRINCIPAIS')||h.includes('CIDADES'))colMap.CIDADES=i;
    else if(h.includes('FUNC'))colMap.FUNCAO=i;
    else if(h.includes('NOME')&&!h.includes('RAZAO'))colMap.NOME=i;
    else if(h.includes('RAZAO')||h.includes('SOCIAL'))colMap.RAZAO_SOCIAL=i;
    else if(h.includes('CONTATO'))colMap.CONTATO=i;
    else if(h.includes('EMAIL')&&!h.includes('COORD'))colMap.EMAIL=i;
    else if(h.includes('COORDENADOR')||h.includes('COODENADOR'))colMap.COORDENADOR_COL=i;
  });

  const rows=[];
  for(let i=headerIdx+1;i<lines.length;i++){
    const cells=parseRow(lines[i]);
    if(!cells||cells.length<3)continue;
    const get=(k)=>(colMap[k]!==undefined&&colMap[k]<cells.length)?cells[colMap[k]].replace(/^["']|["']$/g,'').trim():'';
    const nome=get('NOME');
    if(!nome)continue;
    rows.push({
      DISTRITO:get('DISTRITO'),SETOR:get('SETOR'),REGIAO:get('REGIAO'),UF:get('UF'),
      CIDADES:get('CIDADES'),FUNCAO:get('FUNCAO'),NOME:nome,
      RAZAO_SOCIAL:get('RAZAO_SOCIAL'),CONTATO:get('CONTATO'),EMAIL:get('EMAIL'),
      COORDENADOR_COL:get('COORDENADOR_COL')
    });
  }
  return{rows,updateDate};
}

// ─── PROCESS DATA ─────────────────────────────────────────────
function processData(rows){
  const result={
    coordenadoresEquipe:[],gerentesContas:[],coordContas:[],projetosEspeciais:null,
    estados:new Set(),divisoes:new Set()
  };

  // Classify all
  rows.forEach(r=>r._cat=classifyFunc(r.FUNCAO));

  // Coord equipe groups
  const coords=rows.filter(r=>r._cat==='COORDENADOR_EQUIPE');
  const assigned=new Set();
  coords.forEach(ldr=>{assigned.add(ldr);});

  const teams=new Map();
  coords.forEach(ldr=>{
    const dist=ldr.DISTRITO||'';
    teams.set(ldr,{leader:ldr,members:[]});
    const bases=[];
    dist.split('/').concat(dist.split(',')).forEach(p=>{
      const n=parseInt(p.trim(),10);
      if(!isNaN(n))bases.push(Math.floor(n/100)*100);
    });

    rows.forEach(r=>{
      if(assigned.has(r))return;
      const cat=r._cat;
      if(['COORDENADOR_EQUIPE','GERENTE_CONTAS','COORDENADOR_CONTAS','GERENTE_PROJETOS_ESPECIAIS','DEDICADO'].includes(cat))return;
      const rd=r.DISTRITO||'';
      if(!rd||rd==='-')return;
      const rn=parseInt(rd,10);
      if(!isNaN(rn)&&bases.includes(Math.floor(rn/100)*100)){
        teams.get(ldr).members.push(r);assigned.add(r);
      }
    });
  });

  // Fallback by COORDENADOR_COL
  coords.forEach(ldr=>{
    const lName=ldr.NOME.toUpperCase().trim();
    const lFirst=lName.split(' ')[0];
    rows.forEach(r=>{
      if(assigned.has(r))return;
      const cat=r._cat;
      if(['COORDENADOR_EQUIPE','GERENTE_CONTAS','COORDENADOR_CONTAS','GERENTE_PROJETOS_ESPECIAIS','DEDICADO'].includes(cat))return;
      const cc=(r.COORDENADOR_COL||'').toUpperCase().trim();
      if(cc&&(cc===lName||cc===lFirst||lFirst&&cc.includes(lFirst))){
        teams.get(ldr).members.push(r);assigned.add(r);
      }
    });
  });

  teams.forEach(({leader:ldr,members})=>{
    const ufVal=(ldr.UF||'').toUpperCase().trim();
    const regVal=(ldr.REGIAO||'').toUpperCase().trim();
    let division=null;
    const allUFs=new Set();

    if(ufVal==='-'||regVal.includes('TLV')){
      division='TLV';
      members.forEach(m=>extractUFs(m.UF).forEach(u=>allUFs.add(u)));
    } else if(ufVal.includes('EXPANS')||regVal.includes('EXPANS')){
      division='EXPANSÃO';
      members.forEach(m=>extractUFs(m.UF).forEach(u=>allUFs.add(u)));
    } else {
      extractUFs(ldr.UF).forEach(u=>allUFs.add(u));
      members.forEach(m=>extractUFs(m.UF).forEach(u=>allUFs.add(u)));
    }

    const group={
      distrito:ldr.DISTRITO,division,estados:[...allUFs].sort(),
      coordenador:{
        nome:ldr.NOME,funcao:ldr.FUNCAO,regiao:ldr.REGIAO,uf:ldr.UF,
        contato:ldr.CONTATO,email:ldr.EMAIL,razao:ldr.RAZAO_SOCIAL
      },
      equipe:members.map(m=>({
        nome:m.NOME,funcao:m.FUNCAO,categoria:m._cat,regiao:m.REGIAO,
        uf:m.UF,cidades:m.CIDADES,contato:m.CONTATO,email:m.EMAIL,
        razao:m.RAZAO_SOCIAL,setor:m.SETOR
      }))
    };

    result.coordenadoresEquipe.push(group);
    if(division)result.divisoes.add(division);
    else allUFs.forEach(u=>result.estados.add(u));
  });

  // GPE + Dedicados
  const gpe=rows.find(r=>r._cat==='GERENTE_PROJETOS_ESPECIAIS');
  const ded=rows.filter(r=>r._cat==='DEDICADO');
  if(gpe){
    const allUFs=new Set(extractUFs(gpe.UF));
    ded.forEach(d=>extractUFs(d.UF).forEach(u=>allUFs.add(u)));
    result.projetosEspeciais={
      lider:{nome:gpe.NOME,funcao:gpe.FUNCAO,regiao:gpe.REGIAO,uf:gpe.UF,contato:gpe.CONTATO,email:gpe.EMAIL},
      dedicados:ded.map(d=>({nome:d.NOME,funcao:d.FUNCAO,regiao:d.REGIAO,uf:d.UF,cidades:d.CIDADES,contato:d.CONTATO,email:d.EMAIL})),
      estados:[...allUFs].sort()
    };
  }

  rows.filter(r=>r._cat==='GERENTE_CONTAS').forEach(r=>{
    const ufs=extractUFs(r.UF);
    result.gerentesContas.push({nome:r.NOME,funcao:r.FUNCAO,regiao:r.REGIAO,uf:r.UF,ufs,contato:r.CONTATO,email:r.EMAIL,distrito:r.DISTRITO});
    ufs.forEach(u=>result.estados.add(u));
  });

  rows.filter(r=>r._cat==='COORDENADOR_CONTAS').forEach(r=>{
    const ufs=extractUFs(r.UF);
    result.coordContas.push({nome:r.NOME,funcao:r.FUNCAO,regiao:r.REGIAO,uf:r.UF,ufs,contato:r.CONTATO,email:r.EMAIL,distrito:r.DISTRITO});
    ufs.forEach(u=>result.estados.add(u));
  });

  return result;
}

function extractUFs(str){
  if(!str||['-','EXPANSÃO','EXPANSAO',''].includes(str.trim().toUpperCase()))return[];
  return str.split(/[/\-,\s]+/).map(p=>p.trim().toUpperCase()).filter(p=>p.length===2&&/^[A-Z]+$/.test(p));
}

// ─── RENDER ───────────────────────────────────────────────────
function render(data){
  const p=data.processed||data;
  const groups=p.coordenadoresEquipe||p.coordenadores_equipe||[];
  const gc=p.gerentesContas||p.gerentes_contas||[];
  const cc=p.coordContas||p.coordenadores_contas||[];
  const pe=p.projetosEspeciais||p.projetos_especiais||null;

  // Status bar
  const totalRep=groups.reduce((a,g)=>(g.equipe||[]).length+a,0);
  document.getElementById('statusBar').innerHTML=`
    <div class="stat-badge">📋 Atualizado: <strong>${data.update_date||data.generated_at?.substring(0,10)||'—'}</strong></div>
    <div class="stat-badge">👥 Coord. Equipe: <strong>${groups.filter(g=>!g.division).length}</strong></div>
    <div class="stat-badge">🗺️ Representantes: <strong>${totalRep}</strong></div>
    <div class="stat-badge">🏢 Gerentes Contas: <strong>${gc.length}</strong></div>
  `;

  // Populate filters
  const allUFs=new Set();
  const allRegioes=new Set();
  groups.forEach(g=>{
    (g.estados||[]).forEach(u=>allUFs.add(u));
    allRegioes.add(g.coordenador.regiao);
    (g.equipe||[]).forEach(m=>allRegioes.add(m.regiao));
  });
  gc.forEach(x=>{(x.ufs||[]).forEach(u=>allUFs.add(u));allRegioes.add(x.regiao);});
  cc.forEach(x=>{(x.ufs||[]).forEach(u=>allUFs.add(u));allRegioes.add(x.regiao);});

  const ufSel=document.getElementById('filterUF');
  const rSel=document.getElementById('filterRegiao');
  [...allUFs].sort().forEach(u=>{const o=document.createElement('option');o.value=u;o.textContent=STATE_NAMES[u]||u;ufSel.appendChild(o);});
  [...allRegioes].filter(Boolean).sort().forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;rSel.appendChild(o);});

  // Build state groups
  const byState={};
  const byDiv={};
  groups.forEach(g=>{
    if(g.division){
      if(!byDiv[g.division])byDiv[g.division]=[];
      byDiv[g.division].push(g);
    } else {
      (g.estados||[]).forEach(uf=>{
        if(!byState[uf])byState[uf]=[];
        if(!byState[uf].find(x=>x.coordenador.nome===g.coordenador.nome))
          byState[uf].push(g);
      });
    }
  });

  // Also add gc/cc to their states
  gc.forEach(x=>(x.ufs||[]).forEach(u=>{if(!byState[u])byState[u]=[];}));
  cc.forEach(x=>(x.ufs||[]).forEach(u=>{if(!byState[u])byState[u]=[];}));

  // Render state cards
  const statesGrid=document.getElementById('statesGrid');
  const statesPanels=document.getElementById('statesPanels');
  statesGrid.innerHTML='';statesPanels.innerHTML='';

  Object.keys(byState).sort().forEach(uf=>{
    const coordsInState=byState[uf];
    const gcInState=gc.filter(x=>(x.ufs||[]).includes(uf));
    const ccInState=cc.filter(x=>(x.ufs||[]).includes(uf));
    const total=coordsInState.length+gcInState.length+ccInState.length;

    const card=document.createElement('div');
    card.className='state-card';
    card.dataset.uf=uf;
    card.innerHTML=`<div class="state-sigla">${uf}</div><div class="state-name">${STATE_NAMES[uf]||uf}</div><span class="state-badge">${total} lider${total!==1?'es':''}</span>`;
    card.onclick=()=>toggleStatePanel(uf);
    statesGrid.appendChild(card);

    // Panel
    const panel=document.createElement('div');
    panel.className='coord-panel';
    panel.id=`panel-${uf}`;
    panel.innerHTML=`
      <div class="coord-panel-header">
        <h3>📍 ${STATE_NAMES[uf]||uf} — ${total} lider${total!==1?'es':''}</h3>
        <button class="coord-panel-close" onclick="toggleStatePanel('${uf}')">✕</button>
      </div>
      <div class="coord-list" id="coordList-${uf}"></div>
    `;
    statesPanels.appendChild(panel);

    // Fill panel
    const list=panel.querySelector(`#coordList-${uf}`);
    coordsInState.forEach((g,gi)=>list.appendChild(buildCoordCard(g,`${uf}-${gi}`)));
    gcInState.forEach((x,i)=>list.appendChild(buildIndividualCard(x,'GERENTE_CONTAS',`gc-${uf}-${i}`)));
    ccInState.forEach((x,i)=>list.appendChild(buildIndividualCard(x,'COORDENADOR_CONTAS',`cc-${uf}-${i}`)));
  });

  // Divisions
  const divGrid=document.getElementById('divisionsGrid');
  const divPanels=document.getElementById('divisionsPanels');
  divGrid.innerHTML='';divPanels.innerHTML='';
  if(Object.keys(byDiv).length>0){
    document.getElementById('divSectionTitle').style.display='flex';
    Object.keys(byDiv).forEach(div=>{
      const dGroups=byDiv[div];
      const card=document.createElement('div');
      card.className='state-card division-card';
      card.dataset.div=div;
      card.innerHTML=`<div class="state-sigla" style="font-size:1.4rem">${div==='TLV'?'📞':'🗺️'}</div><div class="state-name">${div}</div><span class="state-badge">${dGroups.length} coord.</span>`;
      card.onclick=()=>toggleDivPanel(div);
      divGrid.appendChild(card);

      const panel=document.createElement('div');
      panel.className='coord-panel';
      panel.id=`divpanel-${div}`;
      panel.innerHTML=`
        <div class="coord-panel-header" style="background:linear-gradient(90deg,#92400e,#b45309)">
          <h3>${div==='TLV'?'📞':'🗺️'} Divisão ${div}</h3>
          <button class="coord-panel-close" onclick="toggleDivPanel('${div}')">✕</button>
        </div>
        <div class="coord-list" id="divList-${div}"></div>
      `;
      divPanels.appendChild(panel);
      const list=panel.querySelector(`#divList-${div}`);
      dGroups.forEach((g,gi)=>list.appendChild(buildCoordCard(g,`div-${div}-${gi}`)));
    });
  }

  // Gerentes Contas (individual section — filtered out from states already shown per-state)
  // Show all in dedicated section
  const gcGrid=document.getElementById('gerentesGrid');
  gcGrid.innerHTML='';
  if(gc.length>0){
    document.getElementById('gcSectionTitle').style.display='flex';
    gc.forEach((x,i)=>gcGrid.appendChild(buildIndividualCard(x,'GERENTE_CONTAS',`gc-all-${i}`)));
  }

  const ccGrid=document.getElementById('coordContasGrid');
  ccGrid.innerHTML='';
  if(cc.length>0){
    document.getElementById('ccSectionTitle').style.display='flex';
    cc.forEach((x,i)=>ccGrid.appendChild(buildIndividualCard(x,'COORDENADOR_CONTAS',`cc-all-${i}`)));
  }

  // Projetos Especiais
  const peGrid=document.getElementById('projetosGrid');
  peGrid.innerHTML='';
  if(pe){
    document.getElementById('peSectionTitle').style.display='flex';
    peGrid.appendChild(buildPECard(pe));
  }
}

// ─── INTERACTIONS ─────────────────────────────────────────────
function toggleStatePanel(uf){
  const panel=document.getElementById(`panel-${uf}`);
  const card=document.querySelector(`.state-card[data-uf="${uf}"]`);
  if(!panel)return;
  const open=panel.classList.contains('visible');
  document.querySelectorAll('.coord-panel.visible').forEach(p=>p.classList.remove('visible'));
  document.querySelectorAll('.state-card.active, .state-card.division-card.active').forEach(c=>c.classList.remove('active'));
  if(!open){panel.classList.add('visible');card&&card.classList.add('active');panel.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function toggleDivPanel(div){
  const panel=document.getElementById(`divpanel-${div}`);
  const card=document.querySelector(`.state-card[data-div="${div}"]`);
  if(!panel)return;
  const open=panel.classList.contains('visible');
  document.querySelectorAll('.coord-panel.visible').forEach(p=>p.classList.remove('visible'));
  document.querySelectorAll('.state-card.active').forEach(c=>c.classList.remove('active'));
  if(!open){panel.classList.add('visible');card&&card.classList.add('active');panel.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function toggleTeam(id,btn){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle('visible');
  const b=btn.querySelector('.coord-expand-btn')||btn.closest('.coord-card-header').querySelector('.coord-expand-btn')||btn;
  if(b.classList.contains('coord-expand-btn')){
    b.textContent=el.classList.contains('visible')?b.textContent.replace('Ver','Fechar'):b.textContent.replace('Fechar','Ver');
  }
}
function toggleCities(id,btn){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle('visible');
  btn.textContent=el.classList.contains('visible')?'🏙️ Ocultar cidades':'🏙️ Principais cidades';
}

// ─── FILTERS ──────────────────────────────────────────────────
function applyFilters(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const uf=(document.getElementById('filterUF').value||'').toLowerCase();
  const func=(document.getElementById('filterFunc').value||'').toLowerCase();
  const reg=(document.getElementById('filterRegiao').value||'').toLowerCase();

  const cards=document.querySelectorAll('.coord-card, .individual-card, .pe-card, .member-card');
  let visible=0;
  cards.forEach(card=>{
    const text=(card.textContent||'').toLowerCase();
    const ufMatch=!uf||text.includes(uf)||card.dataset.uf===uf.toUpperCase();
    const qMatch=!q||text.includes(q);
    const funcMatch=!func||text.includes(func.replace('_',' '))||card.innerHTML.toLowerCase().includes(func.toLowerCase());
    const regMatch=!reg||text.includes(reg.toLowerCase());
    const show=ufMatch&&qMatch&&funcMatch&&regMatch;
    card.style.display=show?'':'none';
    if(show)visible++;
  });
  document.getElementById('emptyState').style.display=visible===0?'block':'none';
}
function clearFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('filterUF').value='';
  document.getElementById('filterFunc').value='';
  document.getElementById('filterRegiao').value='';
  applyFilters();
}

// ─── DATA LOADING ─────────────────────────────────────────────
async function loadData(force=false){
  const cb=force?`?cb=${Date.now()}`:`?cb=${Math.floor(Date.now()/300000)*300000}`;
  try{
    // Try data.json first (generated by script.py)
    let resp=await fetch(`./data.json${cb}`);
    if(resp.ok){
      const json=await resp.json();
      DATA=json;
      document.getElementById('updateInfo').textContent=`Atualizado: ${json.update_date||json.generated_at?.substring(0,10)||'—'}`;
      const p=json.processed||json;
      render({processed:p,update_date:json.update_date,generated_at:json.generated_at});
    } else {
      // Fallback: load CSV directly
      await loadFromCSV(force);
    }
  } catch(e){
    try{await loadFromCSV(force);}
    catch(e2){showError();}
  }
}

async function loadFromCSV(force=false){
  const cb=force?Date.now():Math.floor(Date.now()/300000)*300000;
  const url=`${CSV_URL}&cb=${cb}`;
  const resp=await fetch(url);
  if(!resp.ok)throw new Error('CSV not found');
  const text=await resp.text();
  const {rows,updateDate}=parseCSV(text);
  const processed=processData(rows);
  DATA={processed,update_date:updateDate,generated_at:new Date().toISOString()};
  document.getElementById('updateInfo').textContent=`Atualizado: ${updateDate||'—'} (CSV direto)`;
  render(DATA);
}

function showError(){
  document.getElementById('loadingState').classList.remove('visible');
  document.getElementById('errorState').classList.add('visible');
}

async function forceRefresh(){
  document.getElementById('appContent').style.display='none';
  document.getElementById('loadingState').classList.add('visible');
  document.getElementById('errorState').classList.remove('visible');
  document.getElementById('filterUF').innerHTML='<option value="">Todos os estados</option>';
  document.getElementById('filterRegiao').innerHTML='<option value="">Todas as regiões</option>';
  await loadData(true);
}

function scheduleRefresh(){
  if(REFRESH_TIMER)clearInterval(REFRESH_TIMER);
  REFRESH_TIMER=setInterval(()=>loadData(true),REFRESH_INTERVAL);
}

async function init(){
  document.getElementById('loadingState').classList.add('visible');
  await loadData(false);
  document.getElementById('loadingState').classList.remove('visible');
  document.getElementById('appContent').style.display='block';
  scheduleRefresh();
}

init();
</script>
</body>
</html>
